body:
  text: 春秋王霸列國世紀編卷三宋李琪撰一列國庶爵世紀齊齊太公之後也武王平天下封師尚父於營丘閲十二世釐公九年為魯隱公元年春秋終始齊十五公迄于簡公四年實魯哀公十四年後三世田氏代齊桓公伯事見齊伯桓紀莊十三年以前僖十八年以後事别為齊世紀云隱元僖公元三盟石門六盟艾七弟年來聘八盟瓦屋意者齊人圖伯之始矣瓦屋周地人情於是乎始變矣九㑹防十㑹中丘㑹伐宋入郕十一入許桓二㑹稷成宋亂三㑹嬴胥命蒲翬如齊逆女送姜于歡㑹歡姜至自齊弟年來聘五如紀十來戰郎十一盟惡曹十三公㑹紀鄭及齊宋衛燕戰四國敗績十四祿父卒襄公元宋以伐鄭十五葬僖公㑹艾十七㑹盟黃戰奚十八㑹齊濼公與姜如齊公薨于齊公喪至自齊莊元夫人孫齊王姬歸二王姬卒姜㑹禚三溺㑹伐衛紀季以酅入四姜享祝丘遇垂葬紀伯姬狩禚五姜如齊師㑹伐衛六歸衛俘七姜㑹防姜㑹穀八圍郕郕降無知弒君諸兒桓公元九殺無知公及齊大夫盟蔇公伐納子糾小白入桓公元葬襄公戰乾時我師敗績取子糾殺之十敗長勺次郎滅談談子奔莒十一王姬歸自莊十三年至僖十七年事見齊伯桓紀僖十八孝公元宋伐師救戰甗敗績狄救葬桓公十九㑹陳蔡楚鄭盟齊二十齊狄盟邢二十一宋齊楚盟鹿上二十三伐宋圍緡二十六侵我西鄙公追至酅弗及伐我北鄙衛伐公以楚伐取穀至伐二十七昭卒昭公元葬孝公二十八戰城濮楚敗績㑹盟踐土遂如齊㑹溫遂圍許二十九㑹盟翟泉三十狄侵三十三國歸父來聘狄侵如齊至齊文元敖如二遂如齊納幣四逆婦姜于齊狄侵九姜如齊至齊狄侵十一狄侵十四潘卒舍敖卒于齊商人弒君舍懿公元單伯如執單伯執子叔姬十五歸敖喪單伯至齊侵我西鄙來歸子叔姬侵我西鄙遂伐曹入郛十六行父㑹陽穀弗及盟遂及盟郪十七伐我西鄙盟穀遂如齊十八齊人弒君商人惠公元遂得臣如齊姜氏歸齊行父如齊宣元遂如齊逆女遂以婦姜至自齊行父如齊公㑹平州以定公位遂如取濟西田為立公故以賂齊也三赤狄侵四公及齊平莒及郯赤狄侵如齊至齊五如齊至齊髙固來逆叔姬髙固及子叔姬來七公㑹伐萊八遂如至黃乃復九如齊至齊伐萊十如齊至齊歸我濟西田元卒頃公元崔氏出奔衛如齊至齊歸父如齊葬惠公行父如齊歸父如齊國佐來聘十一歸父㑹伐莒十三伐莒十四歸父㑹榖十五蔑㑹髙固無婁十八晉衛伐成二伐我北鄙戰新築衛敗績行父許僑如嬰齊㑹晉衛曹及戰鞍齊敗績國佐如師及國佐盟爰婁取汶陽田及楚盟蜀五㑹同盟蟲牢七㑹救鄭同盟馬陵八晉韓穿言汶陽歸齊㑹伐郯九㑹同盟蒲無野卒靈公元葬頃公十㑹伐鄭來媵十一僑如如十三㑹伐秦十四僑如逆女僑如以婦姜至自齊十五㑹同盟戚㑹㑹吳鍾離十六㑹沙隨㑹伐鄭十七㑹伐鄭同盟柯陵髙無咎出奔莒㑹伐鄭十八殺大夫國佐崔杼㑹同盟虛朾襄元㑹鄫二崔杼㑹戚遂城虎牢三㑹同盟雞澤及袁僑盟五㑹吳戚戍陳㑹救陳六滅萊八㑹邢九㑹伐鄭同盟戲十㑹㑹吳柤㑹伐鄭十一㑹伐鄭同盟亳城北㑹伐鄭㑹蕭魚十四㑹㑹吳向㑹伐秦衛侯出奔十五劉夏逆王后伐我北鄙圍成公救至遇十六伐我北鄙伐我北鄙圍成十七伐我北鄙圍桃髙厚伐我北鄙圍防十八伐我北鄙㑹同圍十九至伐衛林父伐環卒莊公元士丐侵至穀聞卒還殺大夫髙厚葬靈公二十㑹盟澶淵叔老如二十一㑹商任二十二㑹沙隨二十三伐衛遂伐晉襲莒二十四羯侵崔杼伐莒二十五崔杼伐我北鄙崔杼弒君光景公元二十七慶封來聘二十八慶封來奔二十九㑹城把髙止出奔北燕三十㑹澶淵宋災故昭元㑹晉楚虢莒去疾自齊入莒四楚執慶封殺之六伐北燕七暨齊平婼如齊蒞盟九貜如十欒施來奔十一㑹厥憖十二髙偃納北燕伯于陽憖奔齊十三㑹平丘同盟平丘十六伐徐十九髙發伐莒二十二伐莒二十五公孫齊次陽州唁公野井取鄆二十六公至齊居鄆公㑹齊盟鄟陵二十七公如齊至齊居鄆公如齊至齊居鄆二十九髙張來唁公三十二㑹城成周定四㑹召陵侵楚盟臯鼬七盟鹹執結侵衛盟沙國夏伐我西鄙八公侵至侵公侵至侵國夏伐我西鄙九齊衛次五氏十及齊平㑹夾谷至夾谷來歸鄆歡龜隂田㑹安甫叔仇如齊十二㑹盟黃十三齊衛次垂葭十四㑹牽㑹洮十五齊衛次渠蒢哀元齊衛伐晉三齊衛圍戚五伐宋杵臼卒安孺子荼叔還如葬景公六國夏髙張來奔陽生入齊陳乞弒君荼悼公元八取歡及闡歸歡及闡十公㑹吳伐陽生卒簡公元趙鞅侵至伐葬悼公公孟彄自齊歸衛十一齊國書伐我公㑹吳伐國書及吳戰艾陵齊敗績獲國書序齊世紀曰齊大師之後受地于王方百里者五東方之國莫大焉桓公之事已詳伯紀矣前乎桓公則僖公有興伯之志而未成後乎桓公則景公有嗣伯之圖而不遂僖公之初已號東州之小伯未有參盟者而僖公參盟于瓦屋未有胥命者而僖公胥命于蒲諸侯稍稍崇向之矣桓公之九合是亦席僖公積纍之勢而强於為善規模之成非僖公前日比也桓公之業雖墮於孝公而齊之為國終春秋之世常為諸侯之雄靈公以來怙其强大頗為夏盟之梗雖以晉悼盛時㑹同之間皆以大夫世子而齊君不出駸駸逼晉之漸景公繼之嗣伯之圖迄於無成反基削弱何哉嘗以齊事顛末考之景公親踵莊公之難堅氷已形玩忽不戒失於改物襲其厲階授政强家卒之姜弱媯昌國遂隨之然亦非一朝一夕之故矣春秋端本澄源之法固不專咎末流也使齊之政權不下移則國豈易量哉鹿門之敗姦宄相尋髙唐之請封殖益厚至於南郭之謀迄遂始禍舒州之事常繼稔亂齊欲不為陳氏不可得也是齊國之微實生於大夫之專然使人心未移則雖授陳氏以柄其敢居哉而齊自叔季以來山澤之利盡歸於國逼介之關暴征於民於是陳氏始得以私售其濡沫之惠公族之無邑者盡反之貧約之無粟者盡子之陳氏欲無得民亦不可得矣是大夫之專實生於人心之去然使齊之禮義素明雖陳氏子孫日以厚利誘民民之心豈易搖哉而齊之家法並妻匹嫡已無以示詒世之訓反坫塞門已有以開僣上之源惠頃之世私家已强崔慶之亂不能正之於先欒髙之亂不能正之於後是以景公象之內嬖孽子以啓嫡庶之爭外助强家以紊君臣之義為齊之民不復知是非逆順之理尊卑之分欲其不歌舞於陳氏之施亦不可得矣是人心之去又生於禮義之不明雖然禮義由賢者出使齊君世得賢者而用之必能為國以禮明民以義豈至陷溺之深而為非禮不義之舉哉而齊自頃惠以來任用益舛靈公之政移於夙沙衛莊公之權委於賈舉州綽循至景悼二公之時慶封方去髙止復專獨一晏子之賢周旋於陳鮑欒髙之間逆知陳氏之患而不得去雖正言於燕閒之頃竊嘆於食享之私力不能為則終為納政與邑不出而已然則欲禮義著明而人心不失其正不可得矣是以禮義之不明又生於仁賢之見弃反覆至是亡齊者豈必陳氏哉齊之為國亦足以自亡矣二列國庶爵世紀許許太嶽之嗣也而封於周入春秋十有一年莊公迫於鄭而奔衛又十有五年而穆公復入國六傳復滅於鄭許祀猶未殄也元公卒之明年實獲麟之嵗隱元十一鄭入許莊公奔衛桓元鄭以璧假許田十五許叔入許莊十六㑹同盟幽二十九鄭侵許僖四㑹侵蔡伐楚新臣卒僖公元葬穆公㑹侵陳五㑹首止盟首止六楚圍諸侯遂救八㑹盟洮九㑹葵丘盟葵丘十齊許伐北戎十三㑹鹹十四城緣陵十五㑹盟牡丘次匡救徐十六㑹淮二十一㑹盂二十二宋衛許滕伐鄭二十七楚陳蔡鄭許圍宋二十八諸侯遂圍許曹㑹圍二十九至圍許三十三晉陳鄭伐許文五業卒昭公元六葬僖公九救鄭十四㑹同盟新城宣十七錫我卒靈公元葬昭公成三鄭去疾伐許鄭伐許四鄭伯伐許九鄭人圍許十四鄭喜伐許十五遷葉襄二晉荀罃伐許十六叔老㑹四國伐許二十四楚蔡陳許伐鄭二十六寧卒于楚悼公元葬靈公二十七㑹宋大夫盟宋三十鄭良霄出奔許自許入鄭昭元㑹晉楚虢四楚㑹申伐吳九遷夷十八遷白羽十九世子止弒君買葬悼公三十三吳敗雞父定四㑹召陵侵楚盟臯鼬遷容城六鄭游速滅許以斯歸哀元圍蔡十三成卒葬元公序許世紀曰許在春秋不得為微國也春秋書許之事甚略焉二百四十二年間許男之卒葬才七見於經大夫之名氏曽不一著于冊凡記許之事自非從齊晉宋楚之役則蒙晉楚齊鄭之兵其他特書者蓋無幾也春秋之所為甚略於許何哉春秋列國久於從夷者莫許若也蓋自齊桓㑹淮之後一於向楚凡百六十年之間與晉者才一二役夷考其事許之為國始終實逼於鄭齊伯未衰許常從齊晉伯方競許常二晉然當其從齊也楚常不得以急許而許猶以無恐於鄭及其二晉也晉雖或無力以得許而許未嘗帖然以從楚是何邪且許之始亡也曰齊侯鄭伯入于許許之終亡也曰鄭游速滅許是許之始終見逼於鄭可知也然自鄭莊入許而不有其地分許而不廢其祀信有大造於許矣未幾爭鄭之事起於忽突而定許之計成於齊魯許叔遂因以入許宜鄭之日有事於許也而自齊桓既伯許七從於㑹盟三從於侵伐雖面縳䘖璧之謀忍決於楚人圍許之餘而衣裳兵車之㑹卒不替於諸侯救許之後鄭人僅能一致淺事之侵蓋未病也豈其許方秉義於從齊鄭亦不得有辭於討許歟齊伯既微宋事亦淺伐鄭㑹盂且服且二不必論矣晉以文襄之盛猶莫能致許於㑹盟自時厥後伐鄭圍蔡惟曰從楚伐吳滅賴惟曰從楚陽橋之師為大夫右孟諸之至為諸侯先凡楚人有事於中華惟許是攝是贊宜許之可以固事於楚而無虞於他國也然自晉文嘗圍以諸侯襄公繼伐以三國悼有知罃之伐平有荀偃之侵猶曰伯討以區區之鄭而伐以去疾又伐以子喜既伐之又圍之使楚人一遷于葉再遷于夷又遷于白羽又遷于容城雖為之訟于楚請于楚至於其君不反于楚而鄭不亡許不止也是何仇許之深邪豈非背順從逆非所以即安而以外謀內雖楚亦未易以逞欲歟反覆許之顛末則其從齊也可以無恐於鄭背晉也而不得以久安於楚亦甚明矣嗚呼許太嶽之祀周之封國也使許不忘鄭之大德毋荒弃先王設侯建屏之義以輔翼伯主尊王敵愾之績則許雖無與立必有與斃何惡於鄭何畏於楚哉而反是也宜春秋之甚略之也三列國庶爵世紀莒莒亦列國也恃陋即亡以見略乎春秋世系本末不可詳考姑序其事為莒世紀隱二入向盟密四伐把取牟婁八盟浮來桓十二㑹盟曲池莊十談子奔莒十九姜氏如二十姜氏如二十七莒慶來逆叔姬閔二慶父出奔莒僖元友敗莒酈獲拿二十五盟洮二十六盟向二十八盟踐土㑹溫圍許文七徐伐敖如莒蒞盟八敖奔莒十八莒弒君庶其宣四公及齊平莒及郯莒不肯公伐莒取向十一歸父㑹齊伐成七㑹救鄭同盟馬陵八嬰齊如莒九㑹同盟蒲楚嬰齊伐潰入鄆十四朱卒十七齊髙無咎奔莒襄元㑹圍宋彭城三㑹同盟雞澤及袁僑盟五㑹吳戚六滅鄫八伐我東鄙九㑹伐鄭同盟戲十㑹㑹吳柤伐我東鄙㑹伐鄭十一㑹伐鄭同盟亳城北㑹伐鄭㑹蕭魚十二伐我東鄙圍台十四㑹㑹吳向㑹伐秦侵我東鄙㑹戚十六㑹湨梁大夫盟晉執莒子邾子以歸十八㑹同圍齊十九盟祝柯二十㑹盟向㑹盟澶淵二十一㑹商任二十二㑹沙隨二十三齊襲二十四齊崔杼伐㑹夷儀二十五㑹夷儀同盟重二十九㑹城把三十㑹澶淵宋災故三十一莒人弒君密州昭元取鄆去疾自齊入莒展輿出奔吳五牟夷以牟婁及防兹來奔叔弓敗莒于蚡泉十意如叔弓貜伐十三㑹平丘同盟平十四去疾卒殺意恢十九齊髙發伐二十三庚輿來奔二十六㑹盟鄟陵三十二㑹城成周定四㑹召陵侵楚盟臯鼬序莒世紀曰春秋二百四十二年之經書莒子者五書莒大夫者四莒之始末不詳於經何邪原莒亦列國也春秋曷為略之夷之也曷為夷之居夏用夷故夷之也且莒之為國逼於齊為甚雖嘗與魯事晉亦皆視齊以為輕重蓋齊國於琅邪莒國於城陽觀齊疆有所謂莒疆之社有所謂莒旁之邑則封壤相錯可知也考之經齊之襲莒者一伐莒者二密州之變去疾以齊入展輿以齊出意恢之亂郊公以齊出庚輿以齊入異時廢置之權宋不得以行於鄭魯不得以行於邾齊獨得而擅之莒莒為齊弱久矣乃若魯最鄰於莒者也入于春秋莒嘗有接魯之文密之盟浮來之盟曲池之㑹洮向之㑹是莒魯之為好也酈之敗蚡泉之敗向鄆之敗牟婁防茲之取是莒魯之為爭也然歸父伐莒則齊魯親也嬰齊如莒則齊魯仇也魯襄恃晉莒滅鄫杞齊頃服晉魯修向盟則莒之於魯一離一合未嘗不以齊故晉最强而逺於莒者也前乎文襄莒雖未有從晉之事自文之伯與㑹者二至景之伯與㑹者亦二悼平之伯與㑹者二十昭定之伯與㑹者各一然馬陵同盟則齊服晉也祝柯同盟亦齊服晉也齊逃湨梁莒為晉執齊圍桃防魯蒙莒伐則莒之於晉一從一違亦未嘗不以齊故夫晉大而逺於莒魯近而弱於晉獨齊鄰於莒而其强十百焉故其畏齊特甚亦其勢然也其他或見伐於徐見入於楚與杞有爭與郯有怨與鄫有惡往往視其强弱以為勝負大抵當春秋之時為弱小之國進退去就從於强令夫衆暴寡大陵小狃於常習皆無足怪而莒之所以為夷者正不在是也秦之為狄始於戰殽鄭之為狄始於伐許莒之為夷必有其故矣莒之弊政見於經者甚寡然嘗考之春秋之始未有書入人之國者入國之事自莒始未有書外專盟之事者專盟之事亦自莒始未有書諸侯相伐取地者相伐取地之事亦自莒始以蕞爾之莒恃其强暴稔尋常之爭逞尺寸之憾皆王法所必誅者也春秋託始於魯隱數簡之中纍書莒人而不殺莒之為夷其昉於是乎終春秋之世國君鮮有不稱諡者莒獨不稱諡大夫鮮有不書名氏者莒獨不書名氏國君無書朝大夫無書聘者是其國無君臣之禮無上下之節無名號貴賤之等無文物施報之容其君凡五見經而斃於亂者二奔於亂者二大夫凡五見經而奔於亂者二誅於亂者一是又其君臣上下之際皆無復分義之相保何以自列于中國哉春秋之外之也宜也或曰莒以僻陋在夷故春秋略之嗚呼春秋書荆人録吳子不輕絶於吳楚如此使莒不安于僻陋春秋庸得而略之乎四列國庶爵世紀薛薛奚仲之後也仲虺相湯世食于薛至周受封實先宗盟當春秋之世薛雖甚微然先代封爵之餘也不可以不志隱十一來朝莊三十一薛伯卒成二楚盟蜀襄元㑹圍宋彭城二㑹戚遂城虎牢五㑹吳戚九㑹伐鄭同盟戲十㑹㑹吳柤㑹伐鄭戍鄭虎牢十一㑹伐鄭同盟亳城北㑹伐鄭㑹蕭魚十四㑹㑹吳向㑹伐秦十六㑹湨梁大夫盟十八㑹同圍齊盟祝柯二十㑹盟澶淵二十二㑹沙隨二十四㑹夷儀二十五㑹夷儀二十九㑹城把三十㑹澶淵宋災故昭十三㑹平丘同盟平丘二十五㑹黃父三十一薛伯榖卒葬獻公三十二㑹城成周定四㑹召陵侵楚盟臯鼬十二薛伯定卒葬襄公十三薛弒君比哀四薛伯夷卒葬惠公序薛世紀曰昔先王之制國大者百里小者不能五十為之建屬長連帥牧正州伯焉雖班爵不同而考禮正刑修德以尊天子其責一也薛諸任之國自奚仲為夏車正而遷于邳仲虺為湯左相而居于薛蓋先代封爵之餘也春秋之初嘗稱侯以朝魯春秋之中嘗稱伯以㑹晉其不得為微國明矣然來魯之後凡百二十二年薛君大夫名氏無見於經自盟蜀之後又百一十年間非從晉於盟㑹而薛事之見於經者才一二耳豈非其國寡弱不足以自通於諸侯歟蓋嘗考之自齊桓主盟諸侯官受方物晉氏世伯列國聽從自以受朝聘之數於是政令不常貢賦無藝迄于春秋之終不惟小侯弱邦率以為病而大國亦不勝其困矣故魯人㑹戚求屬鄫也齊人盟宋求屬邾也至於成周之㑹宋遂傲然欲以二三小國為役而絶薛於周吁先王建國同為蕃屏王室而宋之為役尚何以為諸侯乎不特此爾觀晉悼始㑹薛實不來曰以齊故及崔子既來薛大夫亦㑹則又以為齊故異時宋嘗從楚又以薛適楚則又不能不為楚令是聽也以蕞爾之薛嘗役于宋矣又逼之以齊臨之以晉楚若何而能國哉吾觀薛宰之言株連反覆首舉踐土之載書以為言而仲幾亦曰踐土固然考之踐土之盟薛不在諸侯意者文公雖復諸侯之職而不必盡勤小國於㑹是時晉之從政者新亦卒莫道文襄之故以復薛之舊吁先王制諸侯建方伯之意微矣崇明祀保小寡之義隱矣惜哉五列國庶爵世紀邾邾曹姓之國也春秋以來微亦甚矣然介乎數大國之間與春秋始終迄于戰國之季而未亡不可不考隱元及邾儀父盟蔑五邾鄭伐宋七公伐邾桓八伐邾十五邾人來朝十七㑹邾儀父盟趡及宋衛伐邾莊十三㑹北杏十五宋齊邾伐郳二十八瑣卒閔二姜氏孫于邾僖元㑹柳公敗邾師于偃十八宋曹衛邾伐齊十九宋曹邾盟曹南鄫子㑹盟邾邾執鄫子用之二十一公伐邾二十二公伐邾取須句戰升陘二十八㑹溫遂圍許三十三公伐邾取訾婁遂伐邾文七公伐邾取須句十三蘧蒢卒十四伐我南鄙叔彭生伐邾晉納捷菑弗克宣元來朝十歸父伐邾取繹十七㑹同盟斷道十八戕鄫子于鄫成二楚盟蜀五㑹同盟蟲牢六來朝七㑹救鄭同盟馬陵八㑹伐郯十三㑹伐秦十五㑹同盟戚㑹㑹吳鍾離十六㑹沙隨㑹伐鄭十七㑹伐鄭同盟柯陵㑹伐鄭十八來朝㑹同盟虛朾襄元㑹圍宋彭城㑹次鄫二㑹戚遂城虎牢三㑹同盟雞澤及袁僑盟五㑹戚六豹如邾七㑹鄬八㑹邢丘九㑹伐鄭同盟戲十㑹㑹吳柤㑹伐鄭戍鄭虎牢十一㑹伐鄭同盟亳城北㑹伐鄭㑹蕭魚十四㑹㑹吳向㑹伐秦㑹戚十五伐我南鄙十六㑹湨梁大夫盟晉執莒子邾子以歸十七牼卒伐我南鄙十八㑹同圍齊十九盟祝柯晉執邾子取邾田自漷水二十㑹盟澶淵速伐邾二十一庶其以漆閭邱來奔㑹商任二十二㑹沙隨二十畀我來奔紇出奔邾二十四㑹夷儀二十五㑹夷儀同盟重二十八來朝三十㑹澶淵宋災故昭元華卒葬悼公十一貜㑹祲祥十三㑹平丘同盟平十八入鄅十九宋伐二十五㑹黃父二十六㑹盟鄟陵二十七㑹扈快來奔三十一黑肱以濫來奔定三穿卒葬莊公何忌及盟拔四㑹召陵侵楚盟臯鼬十四來㑹公十五來朝來奔喪哀元何忌伐二斯州仇何忌伐取漷東田沂西田州仇何忌及盟句繹三州仇何忌圍六何忌伐七公伐入邾以邾子益來八歸益于邾十益來奔序邾世紀曰邾其猶有聖賢之澤歟春秋之初克之未命猶以字稱克之既卒始以子録其得齒於列國最後也鄫子見戕須句蒙取而威虐是肆庶其竊邑黑肱専地而姦宄內訌㑹盟屬齊厚斂私吳君為晉俘國習衛討宋壘在郊魯兵狎鄙而强大外陵藐然之邾亦幾於無足稱者然君子所為猶有取於邾者豈謂是哉嘗考之經二百餘年小國之睦於交鄰謹於事伯最為有常者莫邾若也其君臣之賢多足稱紀而守義秉禮之風類非當時大國之所及吁亦有所自來矣且魯自桓公之世邾稱人以朝者一宣公以來邾稱子以朝者一㑹公者一奔喪者一自其他近魯之小國雖有好魯之事蓋未能如邾之有常者非交鄰之睦歟齊桓之伯首從北杏之㑹宋襄之伯亦與曹南之盟晉文之伯亟聽于溫之役定公之㑹晉者十一宣公之㑹晉者十七悼公之㑹晉者七莊公之㑹晉者一自其他畏晉之小國雖鮮有不從晉之事蓋未能如邾之有常者非事伯之謹歟儀父盟蔑之舉首親賢以修好蘧蒢遷繹之謀不憚忘身以利民皆卓為賢君求之當時諸侯往往佳兵以殘民信鮮儷矣叔術遜國之仁足以及其子孫茅夷鴻愛國之義足以存其宗社皆儼為賢臣求之當時列國大夫莫非狥利以背君亦可謂絶無而僅有矣孰謂區區之邾剪焉若不足以自存而君臣上下之間顧有是邪異時捷菑介晉以求主郤克以八百乘之衆至于城下邾人以一辭郤之蓋昔者宋之得施於鄭戎之得施於曹者晉曽不得以行之於邾也楚靈合諸侯于申汰心虐焰震搖中華宋鄭大侯奔走恐後邾人亦獨晏然恃魯以不㑹蓋昔者楚成共所能令於蔡鄭吳夫差所能令於魯衛者靈王獨不能以加之於邾也吁蕞爾之邾果何以得此於晉楚邪庶幾守義秉禮之風亦略可觀矣吁魯之擊柝聞於邾其殆密邇洙泗之地濡染儒書之習有聞周公之教而興起者乎蓋至穆公之時邾與魯閧民不死難而仁政之言親上死長之訓猶得聞於先生大儒之口則邾之為國猶未至於空虛也不然以微國而介於齊晉宋魯之間何啻鹿豕在於餧虎之側抑何以夀其國至於久而不傾哉六列國庶爵世紀小邾小邾微乎微者也嘗以名書乎經矣受附庸之封齒列國之後能𫝊於久故亦為之紀云莊五郳黎來來朝十五宋齊邾伐郳僖七小邾子來朝杜云郳黎來朝得王命而來邾之别封故曰小邾襄二㑹戚遂城虎牢七來朝九㑹伐鄭同盟戲十㑹㑹吳柤㑹伐鄭戍鄭虎牢十一㑹伐鄭同盟亳城北㑹伐鄭㑹蕭魚十四㑹㑹吳向㑹伐秦十六㑹湨梁大夫盟十八㑹同圍齊十九盟祝柯二十㑹盟澶淵二十二㑹沙隨二十四㑹夷儀二十五㑹夷儀同盟重丘二十九㑹城把三十㑹澶淵宋災故昭三小邾子來朝四楚㑹申十三㑹平丘同盟平丘十七來朝二十五㑹黃父三十二㑹城成周定四㑹召陵侵楚盟臯鼬哀四宋執小邾子序小邾世紀曰小邾亦曹姓之國介於海濵畏齊事魯而逼於宋非一日也觀晉悼之世小邾子不至於㑹悼公欲討之其大夫曰是齊故也晉襄之世小邾嘗至於朝襄公欲卑之其大夫曰是實不忘魯好也非其畏齊事魯者然歟魯莊十五年經書伐郳者宋人哀四年經書執小邾者亦宋人又非其逼於宋者然歟夫以弱國小衆剪然求存於强齊宋魯之間常恐不合亦無足道明矣然考之經把朝而不稱侯以其不共於朝也介來而不謂朝以其不能乎朝也以至滕薛邾莒之爵皆以成國而駸駸焉日趨於僻陋之域而不自知春秋或自侯而書伯書子或自子而書人書名其不能國亦可知矣獨小邾自黎來之來其國稱郳則非成國也其君稱名則未成乎君也其朝稱來則不成乎朝也豈不甚微矣乎而黎來之後遂能以禮通於侯國卒從齊桓以尊周室而受附庸之封魯僖以後朝魯者四晉悼以後㑹晉者二十執玉端委而周旋於强侯大邦之間從事於禮樂文物之盛是可嘉也已故嘗觀昭公十七年小邾子來朝於其燕也有菁莪之賦叔孫昭子曰不有以國其能久乎嗚呼藐然之邾逼而不傾與春秋終始焉是豈無所自來哉七列國庶爵世紀鄫鄫事至無足言矣見於經者才數端聖人録之所以示亡國之鍳可不謹歟僖十四季姬及鄫子遇防使鄫子來朝十五季姬歸鄫十六鄫季姬卒十九㑹盟于邾邾執用之宣十八邾人戕鄫子于鄫成二楚盟蜀襄元次鄫五豹鄫巫如晉㑹吳戚六莒人滅鄫序鄫世紀曰鄫之為國微乎微者也事之見乎經者無幾矣一朝於魯一㑹于宋其君見用於邾而終戕於邾其國見逼於莒而卒滅於莒孱弱如是是尚得為國乎雖然國無小不可易也禮義茍明逼而不傾鄫之滅亡誰之咎哉蓋滅人者罪易見滅於人者罪難知使鄫能强於為善以保其國亦何孱弱之有今考之經鄫之亡其大罪有二而他不與焉三綱五常建於天地豈非保身立國之大本歟縱情虧禮者殺身之符劵徇愛棄義者亡國之斧斤斷斷乎不可誣矣先儒謂鄫子之用於邾戕於邾不在於曹南之後宋與其臣子之不能捍患也遇防來朝啓怨再世而鄫子已亡矣鄫之逼於莒而滅於莒不在乎㑹戚之屬魯與其鄰國之不救患也如晉覿巫立所出以為後而鄫國已滅矣嗚呼身有既亡國有既滅而不自知者其鄫之謂乎春秋本其遇防之禍而直書之曰戕備其覿巫之跡而顯書之曰滅其垂戒之意逺矣以此坊民後世猶有玩尤物以喪其身保異姓以墜其國者吁八列國庶爵世紀紀紀事前乎春秋無聞焉亦齊之宗也而逼於齊季入齊矣季姬歸酅矣春秋猶書紀焉是存紀也紀而序之是亦春秋之意歟隱二裂繻來逆女伯姬歸于紀紀莒盟密七叔姬歸紀桓五齊鄭如紀六公㑹紀于成來朝八祭公來遂逆王后于紀九紀季姜歸京師十三公㑹紀鄭及齊宋衛燕戰四國敗績十七公㑹齊紀盟黃莊元齊遷紀郱鄑郚三紀季以酅入齊四紀伯姬卒紀侯大去其國齊葬紀伯姬十二紀叔姬歸于酅序紀世紀曰紀為齊弱久矣亡紀者齊歟紀歟昔者大王居邠嘗逼於狄矣綿之詩曰肆不殄厥愠亦不殞厥問柞棫拔矣行道兊矣昆夷駾矣夫自其乃慰乃止乃疆乃理以至於髙門有伉冡土既立軍國之容無一不備然後可以不絶其所愠之夷亦不廢其聘問之禮以須昆吾之駾蓋寒暑之節龍蛇之蟄未有不積而能施不屈而能信者此大王所以去邠而基王業歟紀齊同姓也而齊欲滅之此豈一朝一夕之積哉紀之自為國者宜何如也入春秋世三年而紀侯去國紀之舛政不詳於經試即其一二事而考之尚有可論者蓋裂繻逆女秋結魯援子伯盟密冬與莒好齊鄭合謀而與魯㑹成鄰好是託魯公解體而季姜歸周王寵是求曽是以為謀難之道歟以至齊怒未怠遽挾鄭與魯以戰齊齊雖敗而怨愈深豈證辭之義敗齊未已又偕魯致齊以盟黃齊雖盟而禍愈亟亦豈釋怨之方夫知畏齊而謀國若是尚謂國有人乎三邑既遷而紀季入齊紀侯去國勢宜然也吁本支同出封壤相鄰蓄憾九世造釁十年而紀終無以謀其不免也非特齊能亡紀紀之為國亦足以自亡矣故曰梁亡自亡也鄭弃其師自弃也紀侯大去其國自去也其與大王去邠之事逺矣然則齊侯無罪乎齊紀同姓而謀紀之國無所不至其罪不待貶絶而自見也乃若春秋之法叛人書奔而紀季入齊不書奔則非叛人竊地稱名而紀季以酅不稱名則非竊地經書紀季以酅入于齊是紀祀猶有奉也異時書紀叔姬歸于酅是紀侯之室家猶有歸也以春秋考之季則未有罪爾九列國庶爵世紀微國傳曰任宿須句顓臾風姓也實司大皥與百濟之祀以服事諸夏小國之祀其先皆有奉之者矣春秋之世存者蓋寡即其見於經者而録之亦古人存周禮而修祀之意歟隱元盟宿八宿男卒莊十宋人遷宿隱二莒人入向無駭入極十宋蔡衛伐戴鄭伐取之桓二蔡鄭㑹鄧鄧侯吾離來朝五州公如曹六實來不復其國七榖伯綏來朝十五邾人牟人葛人來朝僖五公孫兹如牟莊十五齊師滅談談子奔莒莊十三齊人滅遂十七齊殱于遂二十三蕭叔朝公僖三十三介人侵蕭宣十二楚子滅蕭莊二十四郭公三十齊人降鄣閔二齊人遷陽僖十狄滅溫溫子奔衛十七滅項十九梁亡二十三公伐邾取須句魯之封國屬國文七公伐邾取須句宣四公及齊平莒及郯十六郯伯姬來歸成七吳伐郯八僑如㑹伐郯襄七郯子來朝宣七公㑹齊伐萊九齊侯伐萊襄六齊侯滅萊成六取鄟襄十遂滅逼陽妘姓十二取邿昭十八邾人襲鄅凡二十五國序庶爵微國紀曰臧文仲言德之不建民之無援昔文武之有天下也選建親賢大國數十亦既足以統屬人心綿固國勢矣其人非周之子孫其地不足以為周之屏翰先王皆爵而列之此其公天下之心豈特以私王室哉存先代之後表仁賢之人皆所謂建德以為民援非惟不可廢亦有所不敢廢也春秋諸侯不復知崇明祀保小寡之義弱强相併而為盟主者亦不復能與其疆埸之事故自隱桓以來魯入極矣鄭取戴矣鄧畏楚衆齊迫陽遷向䝉莒師邾踐鄅境終春秋之世微國困於兵革寇攘之禍殆不勝數而得周旋於幣玉牲歃以從諸侯之後者其無幾焉耳吁亦足以見周禮之衰矣德之不建民之無援是以生民不復見德干戈之禍極於戰國而後已悲夫木之茂也羣動息焉水之涸也雖蛙蛙不能以自存方春秋之中世魯雖無腆猶存須句見王澤之未殄也至其末也顓臾在邦域之中猶且不免見王澤之竭也君子於此亦可以考論世變云十夷狄世紀楚楚之先熊繹始封於荆閲世十三至武十九年為魯隱公元年春秋始終楚十三君迄于惠之八年實魯哀之十四年又十有三世而滅於秦隱元楚武王十九年按史記熊通立三十五年伐隨隨人為之請周尊楚王室不聼熊通怒而自立為武王莊四文王元十荆敗蔡莘以獻舞歸十二荆入蔡十六荆伐鄭十七楚敖元二十一成元二十三荆人來聘二十八荆伐鄭僖元楚人伐鄭二楚人侵鄭三楚人伐鄭四遂伐楚次陘楚屈完來盟盟召陵至伐楚五滅弦六圍許十一伐黃十二滅黃十五伐徐敗徐婁林十九盟齊二十伐隨二十一盟鹿上㑹盂執宋公以伐宋宜申來獻捷㑹盟薄釋宋公二十二戰泓宋敗績二十三伐陳二十五圍陳納頓子于頓二十六遂乞師滅䕫以䕫子歸伐宋圍緡公以楚師伐齊取榖二十七圍宋公㑹諸侯盟宋二十八救衛戰城濮敗績殺大夫得臣衛侯出奔楚衛侯鄭自楚復歸衛文元世子商臣弒君頵穆王立三圍江晉處父伐楚救江四滅江五滅六九伐鄭椒來聘十殺大夫宜申次厥貉十一伐麇十二圍巢十三莊王立十六滅庸宣元侵陳遂侵宋三伐陸渾之戎楚自有周道吾鄧魯陽關過魚齒㳂汝水度成澤以伐陸渾之戎遂觀兵周疆視之若無人矣侵鄭四伐鄭五伐鄭八滅舒蓼九伐鄭十伐鄭十一楚陳鄭盟辰陵殺陳夏舒入陳納寧行父于陳十二圍鄭戰邲晉敗績自入陳勝邲楚莊一向遂驕伯業之終荒豈不由此哉滅蕭蕭是宋附庸豈足以當楚師今久圍不退明年申舟聘齊又令無假道于宋是欲激宋而起兵端也莊王之心至此荒十三伐宋十四圍宋十五歸父㑹楚于宋宋及楚平十八旅卒春秋以前未嘗書君之卒今於楚莊特書之吁春秋雖欲不書安得而不書共王立成二楚鄭侵衛公㑹嬰齊于蜀十二國盟蜀六嬰齊伐鄭七嬰齊伐鄭吳入州來楚始罷於奔命九嬰齊伐莒莒潰入鄆十五伐鄭宋魚石出奔楚十六戰鄢陵楚鄭敗績殺大夫側十七滅舒庸十八楚鄭伐宋傳伐彭城納魚石楚鄭侵宋襄元壬夫侵宋殺大夫申三嬰齊伐吳五殺大夫壬夫貞伐陳七貞圍陳八貞伐鄭十楚鄭伐宋貞救鄭十一楚鄭伐宋執鄭良霄十二貞侵宋十三審卒康王立十四伐吳十八午伐鄭二十蔡履出奔陳弟黃出奔二十一晉欒盈出奔二十二殺大夫追舒二十三黃自楚歸陳二十四伐吳楚蔡陳許伐鄭二十五屈建滅舒鳩吳遏伐楚門巢卒二十六許男寧卒于楚楚蔡陳伐鄭二十七㑹晉楚于宋盟于宋二十八公如楚昭卒郟敖立二十九公在楚至楚三十薳罷來聘昭元㑹晉楚虢麇卒比出奔晉靈王立四十三國㑹申執徐子八國伐吳執齊慶封殺之遂滅賴五殺大夫屈申八國伐吳六薳罷伐吳叔弓如楚七公如楚至楚八執陳于徴師殺之滅陳執招放于越殺孔奐九叔弓㑹楚于陳十一䖍誘蔡般殺于申弃疾圍蔡滅蔡執世子有歸用之十二殺大夫成熊伐徐十三比自晉歸楚弒君䖍于乾溪弃疾弒比平王立十六誘戎蠻子殺之十七及吳戰長岸二十一蔡朱出奔楚二十二宋亥寧定自宋南里出奔二十三蔡東國卒于楚二十殺大夫郤宛三十徐子章羽奔楚定二伐吳四十八國㑹召陵侵楚圍蔡蔡以吳及楚戰柏舉楚敗績囊瓦出奔鄭吳入郢十四三國滅頓以頓子牂歸十五滅胡以胡子豹歸哀元楚陳隨許圍蔡四晉人執戎蠻子歸于楚六軫卒九伐陳十結伐陳十三申伐陳序楚世紀曰楚為外域前乎春秋已慮之矣詩云撻彼荆楚是也然春秋書外域之法未有嚴於楚者始曰荆繼曰楚始曰人繼曰子何其進之漸而與之不亟邪春秋之世外域為中國患者曰秦楚吳越戎狄戎盛於春秋之始狄微於春秋之中吳始大於春秋之季秦直為晉仇越僅與吳抗其患皆未有若楚之暴且久者是故春秋書楚之法特嚴歟然自天下大勢言之則楚之患其初止於猾夏其後至於抗衡又其後遂至於用中夏之柄由楚一國之勢言之則共莊以前雖僻在荆蠻而其國實趨於强康靈以後雖屢抗中華而其國實趨於弱究一經之始末而楚之盛衰槩可考也蓋楚有方城以為城漢水以為池有申吕之田以禦乎外有申息之門以備於內有成莊共平康昭之為君有子文孫叔子庚子木子蕩之徒為之謀其國此其所以能世抗齊晉而與春秋始終歟嘗觀楚十三君其與齊晉爭者非一國成之世所爭者蔡鄭陳宋曹衛而大者則召陵之盟泓與城濮之戰也穆莊之世所爭者獨不及曹衛而大者則辰陵之盟邲之戰也共之世所爭者又獨不及蔡而大者則蜀之盟鄢陵之戰蕭魚之㑹也至康盡得諸侯而遂有宋之盟至靈幾伯諸侯而遂有申之㑹吁是豈一日之故哉顧自齊桓不與楚角諸侯雖一向一背而其患猶止於猾夏晉文親與楚敵後世狃於或勝或負而其勢遂駸駸抗衡至晉平不能與楚抗而夷夏之世不知其孰重孰輕也於是楚人遂得偃然以竊用吾中國之柄矣雖然武文以來楚未有抗衡於齊晉也其君無日不申訓於國申警於軍嵗饑而振廪旅至而施惠大户以行師量功而用民而民政舉於內入鄭而不以為俘克陳而不以為縣宫衛有環尹若敖有六卒荆而舉古制以行則軍政立於外內選於親外選於舊而賢戚不遺復黃以勸善立午以靖國而賞罰不失以區區之荆蠻至於强大莫挍豈偶然邪靈康以後楚雖專令於諸侯而自州來奔命楚始患吳鍾離􅑒師吳始易楚數十年間楚始不競加而疆埸謀踈輕師而基亡郢之菑城邑而墮挑吳之釁無極好讒蔡人速飛伍員逃吳楚君旰食薳越出師宋師日至遂至以堂堂之楚喪敗相尋亦果曷為而然邪由始而觀之楚自微而浸盛由終而觀之楚方盛而已衰蓋無平不陂無往不復外域之强固未有能久而不替者理之常也雖然楚本熊繹之後由為强邦春秋之前既以為外域矣春秋之世聖人雖屢進之迄不得與滕薛之侯例以爵通於中國其罪抑安在邪世竊名號而拔本塞源之罪蓋有不勝誅者不然楚荆州之國也聖人豈宜以其地而外之也哉十一列國夷國吳世紀吳吳泰伯之昭也讓國於季歷而自竄於吳仲雍嗣之越十有九世而吳事始見於經也實壽夢之二年後十七年而春秋實夫差十五年又八年而越滅吳成七伐郯入州來十五十七國㑹于鍾離襄三楚嬰齊伐五二國㑹吳善道十二國㑹于戚十十二國㑹于柤遂滅逼陽十二子乘卒十四十五國㑹吳入向楚公子貞伐二十四楚伐二十五子遏伐楚門于巢卒二十九閽弒餘祭使札來聘昭元莒展輿出奔吳五楚八國伐六楚薳罷伐十三滅州來十五夷末卒吳王僚元年十七吳楚戰長岸二十三敗頓胡六國于雞父胡沈滅獲陳夏齧二十四伐巢二十七吳弒君僚吳王闔廬元三十滅徐三十二伐越定二楚伐四蔡以吳及楚戰柏舉楚敗績入郢五於越入吳於越敗吳欈李光卒吳王夫差元年哀三蔡放大夫獵于吳四蔡辰出奔吳六伐陳叔還㑹柤七公㑹吳鄫八吳伐我十公㑹吳伐齊救陳十一公㑹吳伐齊戰艾陵齊敗績獲國書十二公㑹吳橐臯十三公㑹晉吳黃池於越入吳序吳世紀曰吳姬姓之長春秋夷之何邪吳僻在海濵不與姬通有年數矣至其極盛亦不過以子録之蓋假竊名號不有宗周春秋不得不深絶焉者然嘗以經考之觀其與晉强弱之形與楚越消長之勢則其事有不獨係一吳之盛衰者蓋其始盛也當晉方患楚而未暇於憂吳其後也當中國倚重於吳而吳亦甚有意於駕晉又其後也晉伯不在諸侯中國亦甚易與則吳之所爭者不在晉而在楚又其最後也中國既不足畏楚人亦不能强而吳之所憂者乃不在楚而在越其顛末有可考者焉何以言之伐郯之師吳事之始見於經者也夀夢立之二年而兵在郯郯魯屬也莫或救之亦可以見中國之無伯當是之時喪師于邲而大恥未灑匱盟于蜀而齊言尚新晉㬌主盟方自虞楚人之至於吳奚暇憂哉馬陵之盟未暇却楚而州來之入乃俯焉有求於吳以吳人攻楚人於中國若未甚害資吳之强以求逞於楚於是中國之大體始虧矣無何鍾離之㑹既以晉而成好於吳善道之㑹又以魯衛而私好於吳然自柤以前猶曰致吳以從中國之㑹也而向以後往往以㑹吳而勤諸侯之行矣吾觀嬰齊伐吳楚始忌吳也至是子囊伐吳楚益忌吳也楚人猶知忌吳而中國諸侯乃帖然與之周旋而不為疾何邪餘祭方立晉楚實為弭兵之㑹不能四年而夷昧君吳季札聘魯蓋札之聘猶餘祭之使也以吳之於中國向也殊㑹而今也稱聘向也狄之言國今也進之稱子向也略之未有位號而今也詳之以著其君臣之辭當中夏茍安之時季子以嫡嗣還觀於上國此其意豈可測哉然魯昭之始凡三年間楚三伐吳而吳不一報吳豈忘楚者乎于是虢㑹復講而晉伯益微申盟麇至而荆蠻方肆吳人不復知晉之可畏則其所爭亦惟一楚耳未幾楚有乾溪之變吳始有州來之師戰于長岸戰于雞父既滅巢又滅徐又伐越夫滅國以自殖伐國以立威吳亦何所不至哉魯定之明年楚嘗伐吳矣不二年而吳遂入郢以楚不忍於吳而薄伐其鄙邑吳深創於楚而直造其國都吳楚之强弱於此可見自是致魯㑹鄫偕魯伐齊而魯奔命楚伐陳而吳爭之魯戰齊而吳助之而齊楚亦病於奔命夫威令長於魯兵患遍於齊楚迄于黃池之㑹春秋紀以兩伯之辭可謂極盛矣然德薄而多大功慮淺而數得志故方其在㑹而諸侯莫敢不至也區區之越乃得乘間以入其國吁當夫差以前吳之所憂豈不在楚而孰知其禍乃出於越哉君子觀吳之盛衰終始凡四變蓋其患始於晉之未暇憂吳成於吳之為援於晉遂至晉弱而吳强晉輕而吳重吳始駸駸求駕于中國楚衰而吳興吳仆而越起中國始展轉蒙患於外裔吁是其事豈直係於一吳之盛衰而已哉善觀春秋亦可以深致其責於景厲以來之晉十二夷國世紀秦秦伯益之後非子受封於孝王附庸之邑在秦襄公有功於平王始受岐豐之地列為諸侯穆公伯西戎以河為竟垂二十世卒并諸國僖十五穆公十五年戰韓獲晉侯二十八戰城濮㑹溫圍許二十九盟翟泉三十晉秦圍鄭三十三入滑晉及姜戎敗秦于殽文二戰彭衙秦敗績晉宋陳鄭伐三伐晉四晉伐五入鄀六康公元七晉秦戰令狐晉先蔑奔九來歸僖公成風襚十伐晉十二術來聘晉秦戰河曲十六楚秦巴滅庸十八罃卒共公元宣元晉趙穿侵崇秦與國二伐晉四縮卒桓公立十五伐晉成二楚盟蜀九秦白狄伐晉十三九國㑹伐至伐十四秦伯卒景公立襄十晉伐十一伐晉十四十三國㑹伐序秦世紀曰秦之為狄其始於殽之戰歟夫秦以非子之餘踐岐豐之地膺顯服以為諸侯春秋之狄之也豈以其地哉觀秦入春秋七十八年而始見經實穆公十有五年由是秦之得書于冊者凡六君然其間秦事之可考捨入鄀滅庸好魯盟蜀數事之外大抵秦晉兵爭之跡耳蓋自穆公釋韓之憾而從事於踐土之盟於是㑹于溫盟于翟泉偕役于圍鄭戮力同心猶驂之靳未始有隙也入滑之師啓釁自秦利人之危以襲其國不哀人之喪而越其竟背盟失信以貪勤民而弃其師無道甚矣由殽之戰遂有彭衙之戰令狐之戰河曲之戰其餘秦之伐晉者六晉之伐秦者亦六暴兩國之衆興數十年報復之師更四君而未已蓋至襄十一年戰櫟之役秦晉交伐之後始絶書于經原始要終則春秋所為狄秦于殽者良有自也然嘗即春秋之所筆以求詩書之所載秦之本末尚有可得而考者夫春秋書秦之事亦甚貶矣至於定書百篇終以秦誓乃甚有取於穆公悔過之善秦詩十篇穆公無美有刺而詳紀秦仲以來强大之由不少殺焉何哉聖人之欲撥亂反正意甚切矣秦起西陲與西戎雜居本以富强為先襄公以後務以耕戰自力而不知禮義終秦之氣象大抵未免似戎讀車鄰駟鐵小戎數詩可以槩見穆公深懲力創於殽之役處仁遷義向背好惡從而一變前日所詆墓木已拱者非今之所謂膂力既愆之良士邪而庶幾有之前日所喜過周超乘者非今之所謂射御不違之勇夫邪而庶幾不欲之截截巧辨能移人之辭者固前日求之惟恐其少者也今乃以其徒實繁而厭之方寸既改羣動皆新充此心也帝王何逺之有蒹葭之詩無作可也何秦俗之不可變哉而秦之卒為狄則是可歎已故聖人於詩述秦仲始大之由以明秦有當變之俗於書備述穆公悔過之美以著穆公幾有能變之道於春秋則追貶穆公始禍之端歷載秦晉以來交兵之跡而狄之以惜秦之終不能變也吁豈不深切著明哉蓋戰殽之後穆公之身伐晉者再亦不能實費誓之言矣尚何責於來世君子觀穆以前秦事未有可稱由穆以後其君皆不逮穆逺甚則秦穆一身實秦國本末盛衰之所係可不察歟十三夷國世紀越越夏后之苖裔也少康之庶子封於㑹稽二十餘世實為允常勾踐繼之至魯昭公五年越事始見於春秋勾踐伯在春秋後其後七世爭起於諸子又七世而閩君搖受封於漢以為越王實勾踐之後昭五王允常楚越八國伐吳八楚滅陳執招放于越三十二吳伐越定五於越伐吳十四於越敗吳于欈李哀元是嵗吳王夫差敗越于夫椒越子以甲楯五千保于㑹稽十三於越入吳序越世紀曰越事之書可一二數矣雖然君子有觀焉夫越以伯禹之苖裔受㑹稽之别封其來久矣入春秋百九十餘年越始見經以吳楚之僣春秋夷之其極盛也猶得書子越於春秋之世常不過以國稱豈非僻陋之甚乎獨勾踐與吳之事可以勵臣子之節為振偷激懦之勸是未容置而弗論也蓋越自楚靈之强常從之以伐吳而闔廬之立遂因之以仇越是以夫差敗于欈李而懷必報之忿及勾踐困于夫椒而遂成不釋之讎然二十年間越不為沼吳其泯矣吁深於仇人者無躁謀巧於用國者無近功齊復紀讎君子不樂其力之有餘魯釋齊怨君子不恕其力之不足當太王之時而不殄其愠不隕厥問以駾昆夷可也當秦襄之世而四牡孔阜俴駟孔羣以討西戎可也有田一成有衆一旅則經綸之餘力足以祀夏務材訓農通商惠工則漕之餘民足以造衛此皆已事之驗夫五千之甲衆至少也㑹稽之棲地至褊也仇吳之念隱忍於柔服之初豢吳之計蓄於卧薪嘗膽之時而沼吳之志卒逞於生聚教訓之間所欲盡從如探囊取物如執劵責負豈非勾踐之所以伯種蠡之所以善謀伍子胥之徒之所甚忌者歟吁天下之事無小大也能勝者勢而先勝者理可為者力而必為者志由越之事則興事造業者亦可以略觀矣十四夷國世紀戎春秋之世戎之類有六曰山戎曰北戎曰姜戎曰雒戎曰茅戎曰陸渾之戎而戎蠻子又諸戎之别種也戎事之書於經者凡十三八見於莊僖以前而宣成以後百二十五年書戎事者才五蓋成宣以後戎世為晉役諸侯鮮得而治之獨晉楚相仇時有治戎之事焉隱二公㑹戎潜公及戎盟唐桓二公及戎盟唐至唐莊十八公追戎濟西二十齊人伐戎二十四戎侵曹曹羈奔陳赤歸三十六公伐戎至伐三十齊人伐山戎三十一齊侯來獻戎捷僖十齊許伐北戎杜云山戎三十三晉及姜戎敗秦殽文八遂㑹雒戎盟暴宣三楚伐陸渾之戎成元王師敗績茅戎昭十六楚誘戎蠻子殺之十七晉荀吳滅陸渾之戎哀四晉執戎蠻子赤歸楚序戎世紀曰春秋之世戎為中國患亟矣雖然有由也先王居檮杌于四裔使內外藩籬不可逾越周室之衰王政不行於是贄幣不通言語不同之人遂居衣冠禮樂之地蓋莊僖之初經之所書獨不過曰戎曰山戎曰北戎僖文之後始有所謂雒戎者姜戎者陸渾戎者雒戎居雒姜戎居于晉南陸渾居于伊川名號雖殊種類則一內外無辦蓋莫甚於東周之季矣嗚呼戎狄是膺荆舒是懲周公之法也晉齊之伯均為有功於中國然以經考之齊有攘戎之功晉有致戎之罪不可不察也何以言之魯隱之末戎狃於東遷之釁恣睢孰甚焉楚丘之變凡伯為執侵曹之禍赤子以歸是非細故小變矣然皆齊伯之未興與齊伯之未定也盟幽以後桓公始大振治戎之旅向者魯之盟㑹相尋凡以戎故燕之職貢不至亦以戎故自桓公遇魯以謀之而魯患息偕許以伐之而燕釁弭戎之戢齊之力也而晉自惠之反實誘戎以遷于伊襄之伯實挾戎以戰于殽自是以後晉嘗恃戎以為犄角之助戎常事晉以為不侵不叛之臣是以其勢不得不至於陸梁異時徐吾之役瑕嘉亦既平茅戎於周矣而蠢蠢之衆猶得挾邥垂之怨以敗王師向之㑹范宣子嘗欲退駒支於盟矣而譊譊之辭終得援惠襄之舊以為晉賜戎之張誰實啓之歟故嘗觀詹伯告晉之辭有曰戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎吁周公膺戎之法廢矣桓公攘戎之功衰矣晉人致戎之罪不可逭矣十五夷國世紀狄春秋二百四十二年書狄者三十六其種有長狄赤狄白狄而潞氏甲氏留吁又赤狄之種也事見於文宣以前之經為多成襄以降書狄事才十之二焉盛衰之故亦槩可考矣莊二十三狄伐邢閔二狄入衛僖八狄伐晉十狄滅溫溫子奔衛十三狄侵衛十四狄侵鄭十八狄救齊邢狄伐衛二十齊狄盟邢二十一狄侵衛二十四狄伐鄭三十狄侵齊三十一狄侵衛三十二衛侵狄衛及狄盟三十三狄侵齊晉敗狄箕文四狄侵齊六晉狐射姑出奔狄七狄侵我西鄙九狄侵齊十狄侵宋十一狄侵齊得臣敗狄鹹長狄十三狄侵衛宣十一晉㑹敗攢函成十二晉敗狄交剛昭元荀吳敗狄大鹵宣三赤狄侵齊四赤狄侵齊十五晉滅赤狄潞氏以嬰兒歸十六晉滅赤狄甲氏留吁鐸辰宣八晉白狄伐秦成九秦白狄伐晉襄十八白狄來序狄世紀曰春秋之世狄戎俱為中國患然狄重而戎輕戎之類有山戎有姜戎雒戎而獨名戎者為最强狄之類有赤狄白狄長狄而獨名狄者亦最强狄比諸戎性尤悍驁戎雖侵暴中國其强易弱狄人敢於滅國當齊桓之亡與聞中國之政不但侵暴而已也然嘗考之經狄之患莫甚於僖文之春秋矣齊之初伯嘗謀邢謀衛自是數十年間嘗置其事於不問晉之盛時亦不過敗狄于箕之一役未幾一二世以後乃纍治狄而不置何邪縱狄若齊桓之拙謀亦無損於伯業之盛治狄誠晉人之雋功而適足以見伯業之衰亦可以考求其故矣蓋嘗論之齊自桓公數年經營以免邢衛於難也㑹柳以來荆患方張衆志未固方將并謀畢力改北轅而南向以圖帖荆之功召陵聽命而諸侯已勤矣是猶門户之寇既悉力以去之藩籬之侮茍幸其不至於為患蓋亦小安焉以休吾室內之人此齊桓之謀國能不强其力之所為管仲之相其君能度其德之所能舉故縱狄不問而卒無損於伯業之盛晉自景公君臣不相聽以為邲之敗也平丘以降諸侯盡離伯業大失於是含垢忍恥閉南關而北出以尋治狄之忿狄雖大創而晉之威重益墮矣是猶烏獲遇盜扃户以避之羞其不以力稱乃逞虐於厠役為士者笑之此皆伯宗荀伯之謬欲以文其喪敗削弱之詬韓范諸臣之專欲以行其厚自封殖之謀雖治狄不置適以見其伯業之衰夫略近效而圖大體故縱狄而不足以為懦匿大恥而求淺功故治狄而不足以為武齊晉之故亦槩可考矣雖然春秋之世諸侯蒙狄之患者凡八國當齊桓之盛猶所不免而自魯襄以後咸無聞焉晉人剪除之力亦豈可掩哉惟其舍內以事外是以君子無取焉耳十六夷國世紀微國春秋之初微國之見於經者甚寡僖公以後始稍出焉聖人因事備録亦可以觀世變矣莊二十六公㑹宋齊伐徐僖三徐人取舒徐即諸夏徐在下邳舒在廬江相去甚逺而越國滅國十五楚人伐徐敖大夫救徐楚敗徐婁林十七齊徐伐英氏文七徐伐莒昭五楚徐八國伐吳十二楚伐徐十六齊伐徐三十吳滅徐章羽奔楚僖十五齊曹伐厲以救徐僖五楚滅弦弦子奔黃江黃道柏方睦於齊皆弦姻也弦子恃之而不事楚僖二十楚伐隨隨以漢東諸侯叛楚桓六年楚武王侵隨少師請追之季梁止之隨侯懼而修政楚不敢伐哀元楚陳隨許圍蔡僖二十六楚滅夔以夔子歸僖二十九介葛盧來東夷介葛盧來三十介侵蕭文十一楚伐麇十二楚圍巢吳楚間小國昭二十四吳滅巢文十六楚秦巴滅庸楚為衆舒叛故舒蓼一國宣九取根牟東夷國成二晉衛伐牆咎如赤狄别種成十七楚滅舒庸襄二十五楚屈建滅舒鳩楚屬國叛楚襄二十五齊髙止出奔北燕昭三北燕欵出奔齊六齊伐北燕十二齊髙偃納北燕伯于陽昭四楚蔡陳許頓胡沈淮夷伐吳昭四楚遂滅賴昭十二晉伐鮮虞白狄别種十五晉荀吳伐鮮虞定四晉衛伐鮮虞五晉士鞅伐鮮虞哀六晉趙鞅伐鮮虞共二十一國序夷微國紀曰深哉逺乎春秋之為中國慮也大而吳楚之君戎狄之人亦既深排而力抑痛懲而亟膺之矣至於蕞爾之國至無足道聖人猶必因事謹志何哉嗚呼春秋之世其始也王室與伯圖相為强弱其後也王室不必言矣乃中國與外裔相為消長又其後也中國不足畏矣外裔又自相盛衰觀隱桓之初外裔之見于經者不過曰戎曰荆莊僖以後介也徐也舒也庸也始纍纍而書于冊也巴以人稱甲潞以氏稱鮮虞牆咎乃以號稱蓋不一而足嗚呼彼吳楚强人之國既得以交起而迭仆更廢而互興也藐然僻陋之邦習於逞思亦安知其終不足以抗衡哉是聖人之所憂也在易姤之初六曰羸豕孚躑躅夫姤隂始生而將長之卦也制之之道當於其微羸弱之豕雖未極剛猛而中心常在於跳躑猶隂微而在外其心常在於剝復小人雖微而在下其心常在於勝君子中國于吳楚諸邦猶陽之有隂君子之有小人也春秋之於微國皆不敢少略焉其為中國慮豈不深逺乎哉雖然春秋之世糾逖異類一正諸華亦惟齊晉之伯是賴也夫何治大舍小其力已有不暇為者當齊桓始伯徐舒有爭晉文盛時介蕭有惡則下是亦安能為之謀哉吁論至於是齊晉攘夷之烈信微矣十七夷國世紀附夷微國春秋大國之從夷者聖人既正色厲辭以誅之矣微國之事故得而略焉彼其行李不通於諸華非因齊晉吳楚之有事鮮有得見于經者姑即其可考者考而論之僖二齊宋江黃盟貫三齊宋江黃㑹陽榖十一楚人伐黃文三楚圍江晉處父伐楚救江文四楚人滅江僖二十五楚圍陳納頓子于頓頓迫於陳而奔楚襄四陳人圍頓昭四楚頓㑹申楚頓伐吳二十三吳敗頓六國于雞父定四公㑹頓子召陵十四楚滅頓以牂歸文三晉六國伐沈沈潰以其服楚昭四楚沈㑹申楚沈伐吳五楚沈伐吳二十三吳敗沈雞父沈滅定四蔡滅沈以沈子歸殺之文五秦入鄀楚滅六臯陶庭堅後叛楚為所滅宣元晉趙鞅侵崇秦與國昭四胡㑹申胡伐吳二十三吳敗胡雞父胡滅定十五楚滅胡以豹歸共八國序附夷微國紀曰春秋諸侯逼於從楚者衆矣當荆吳甚盛之時自魯宋大國至於邾莒小侯未有不折而從之者矣春秋於齊之盟曰人楚以人諸侯也宋之役亦曰人楚以人諸侯也柤之㑹殊吳而致魯鄬之㑹沒鄭而逃陳其貶絶之甚矣然至於㑹宋則列書大夫㑹申而悉書諸侯㑹黃池則著晉而不沒公端若無所貶焉何哉亦嘗求其故矣彼伯業不競不在諸侯主齊盟者亦既俯焉聽令於吳楚而偕之為㑹矣則宋魯陳蔡鄭許之國何尤乎宋魯陳蔡鄭許之國不足罪則夫小於宋魯陳蔡鄭許之國又何尤乎故嘗論齊桓之伯能帖荆於召陵而不能止江黃之伐晉文之伯能致秦敗楚於城濮而不能保鄀六之不亡桓文且爾他何望哉小國尚安所恃而不奔走於從夷也是故崇屬於秦郯屬於吳沈徐胡頓皆屬於楚凡小國之從秦楚諸邦者信未有罪焉爾末年齊晉益微中國不能以一矢遺西南而封豕長蛇之類自相雄奪其得免於滅亡者亦鮮焉吁小國之甘於外附將以求免也而終無以自立又何其甚不幸歟昔吳伐郯季文子曰中國之無伯也世變至是春秋安得而不終乎春秋王霸列國世紀編卷三

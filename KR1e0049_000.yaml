body:
  text: 春秋王霸列國世紀編目錄春秋類卷一一周王二齊桓三宋襄四晉文五晉襄六晉靈成景厲七晉悼八晉平昭九晉頃定十魯卷二一蔡二曹三衞四晉五鄭六滕七邢八郕九同姓㣲國十陳十一杞十二宋卷三一齊二許三莒四薛五邾六小邾七鄒八紀九庶爵㣲國十楚十一吳十二秦十三越十四戎十五狄十六夷狄㣲國十七附夷㣲國臣等謹案春秋王霸列國世紀編三卷宋嘉定中李琪撰琪字開伯吳郡人其書以諸國為綱而以其國之事見于春秋者類編為目前有序後有論斷第一卷為王朝及霸國霸國之中黜秦穆楚莊而有宋襄又于晉文以下列自襄至定凡十君而附以魯第二卷為周同姓之國附以三恪第三卷皆周異姓之國而列秦楚吳越于諸小國後其位置皆非無故至于譏晉文之借秦抗楚而秦興晉悼之結吳困楚而吳熾則為徽宗之通金滅遼而言譏紀侯鄰于讎敵而不能自强則為高宗之和議而𤼵稱魯于已滅之後至秦漢猶為禮義之國則自解南渡之文弱亦屬顯然蓋借春秋以發議非必于經義一一脗合也然胡安國傳亦借春秋以發議者安國書今既不廢則是書亦可併存矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫世毅總校官臣陸費墀春秋列國世紀編原序春秋一書事變至繁經文至約接王政之末流則可稽世道之升降備伯事之終始則具見中夏之盛衰詳列國之離合則足究人心之聚散夫以二百四十二年之記一百二十四國之行事國各有史晉乘楚杌故典舊章冊書浩博是非紛糾而春秋以萬八千言該之國無不記之事事無不著之實自學者捨經求傳事始繁而晦矣蓋始讀經者睹本末之宏闊而考之於訓辭簡嚴之中錯陳迭見未究前後不知據經以覈傳固有按傳而疑經是不能比其事而觀之也琪少竊妄意叙東周十有四王之統合齊晉十有三伯之目舉諸侯數十大國之系皆世為之紀不失全經之文畧備各代之實每紀之後序其事變之由得失之異參諸傳之紀載以明經之所書雖若詳而不遺於事豈能精而有合於理初學問津或有取焉若夫春秋微㫖奥義則不在是深於經者固自知之也此編作於辛亥之冬列國諸紀櫽括未竟懼其條目破碎援筆輒止諸老先生每索此書無以復命猶子韶為之補續其未成猥加整比越二十年甫為全書非敢以示學經者姑存其藁於家塾云嘉定辛未秋七月甲子吳郡李琪序

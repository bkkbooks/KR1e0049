body:
  text: 春秋王霸列國世紀編卷二宋李琪撰一列國同姓世紀蔡蔡周蔡叔子蔡仲之後也蔡仲克庸祗德周公以為卿士蔡叔既沒乃命諸王邦諸蔡仲越九世而宣公考父立宣公二十八年為魯隱元年春秋終始蔡十二公訖於成公十年由成公以降歷三世而楚惠王滅蔡隱元宣二十八年四伐鄭伐鄭八考父卒葬宣公蔡桓侯元年以蔡季請諡獨書侯十伐戴桓二鄭會鄧五從王伐鄭六殺陳他十一柔宋陳盟折十四宋以伐鄭十六會伐鄭十七封人卒哀公元年季自陳歸蔡葬桓侯莊五會伐衛八次郎以俟十荆敗莘以獻舞歸史記謂哀侯留於楚九年卒十三會北杏十四荆入二十蔡穆公元年表載是年始立僖四會八國侵潰十四肸卒莊元十九會盟齊二十一會盂二十七圍宋二十八會盟踐土會溫二十九盟翟泉文十次厥貉十五晉郤缺伐入十六文公元宣十七申卒葬文公景公元成八晉欒書侵襄八鄭侵獲燮二十殺燮履出奔楚二十四伐鄭二十六伐鄭二十七會宋三十世子般弒君固葬景公靈公元昭元會虢四會申伐吳五伐吳十一楚誘般殺于申楚圍滅執世子有歸用冬楚子城陳蔡不羹使公子棄疾為蔡公十三平元廬歸蔡靈公十五朝吳出奔鄭二十廬卒二十一葬平公蔡侯朱立當國一年為國所逐故不改元不稱諡朱出奔楚楚費無極求貨于東國使蔡人立朱而出東國是為悼公邾公元三十三東國卒于楚昭公元吳敗師雞父定四會召陵侵楚公孫姓滅沈以嘉歸殺之楚圍以吳及楚戰柏舉楚敗績蔡欲報楚也不以晉而以吳晉事亦可知矣此所以卒有黃池之會五歸粟哀元楚陳隨許圍二遷州來殺大夫駟三放大夫獵于吳四盜殺申辰出奔吳殺大夫姓霍葬昭公成公元十四終成公十年成公十九年卒聲公繼立序蔡世紀曰蔡何以始乎同姓昔者蔡衛嘗爭長矣萇𢎞曰蔡叔康叔之兄也先衛不亦可乎則蔡固宗盟之長也蔡以宗盟之長乃甚略之何哉蔡以十二公而卒書于册者惟六君稽其行事闕而不備春秋之義同奬宗國豈固置厚薄於其間蓋蔡以神明之胄其汙於事楚而不能反者春秋以僣王外楚而顧從之此其不足於蔡歟夫蔡事雖略而聖人備著其始末焉不獨係一蔡之盛衰而中國消長之形荆楚強弱之端皆可尋矣蔡之始事録于經曰蔡侯鄭伯會于鄧始懼楚也蔡之終事録於經曰蔡遷州來圖避楚也則蔡之始終不靖者皆以楚故也楚之始事録于經曰荆敗蔡師于莘楚之終事緑于經曰楚子陳侯隨侯許男圍蔡則楚之終始用事者又皆以蔡故也齊晉之伯其始事録于經曰侵蔡遂伐楚盟于召陵治蔡之黨楚也其終事録于經曰會于召陵侵楚以蔡之請伐楚也則中國之始終用師者皆以蔡故也原始占終則蔡固有關於春秋之世變不可不察也大抵蔡邇於楚而親於楚事楚愈堅而蒙楚之害愈深蔡逺於中國而踈於中國其二中國最甚而中國亦無力以及蔡凡中國之糾合夏盟諸侯狎至而蔡獨不附凡楚之撓敗王略諸侯莫從而蔡獨先與方蔡宣桓二公之初從王伐鄭則猶修勤王之職也會于鄧盟于折會于曹則猶交諸侯玉帛之好也伐鄭伐戴伐衛則猶同諸侯兵車之會也自敗莘以來五年兩被荆師哀侯蒙塵不返其臣不能告於同盟厲復讎之大義乃甘為楚向釋戴天之至怨納肘腋之深交由是渙然與中國離矣齊桓稱伯蔡僅一從北杏之會穆莊以後行李不至贄幣不通雖召陵加師國潰而無從夏之志齊桓終不得致蔡於盟會齊桓既沒晉文未興楚成抗衡北方蔡是攝是贊十九年楚盟齊則蔡首偕至二十一年楚會盂則蔡復偕至二十七年楚圍宋則蔡又偕至何不移所以事楚者加於事齊而反忘其讎楚而服楚哉城濮之戰楚既大創蔡始改圖晉之三會黽勉周旋踐土載書曰晉重蔡午藏在周府列國皆能道之則蔡之子孫世踐舊盟可也奈何蔡莊身自背之晉文即世無復向晉至文十年厥貉之次遂執干戈挾楚穆為窺宋之謀十五年晉郤缺討其不與新城之會蔡雖黽勉從城下之盟二晉如故也文公方謀事晉畏楚不得行而卒景靈不紹文志反堅於與楚成六年欒書之師方涉蔡鄙而楚申息之救已至蔡自以附楚為良圖也晉悼之興列國悚焉如陳如鄭相率事晉矣蔡且安於楚之宇下襄八年鄭以晉命侵蔡獲公子燮而楚復興子囊之師為蔡仇鄭悼公得陳鄭而力已疲矣所以姑置蔡於不問晉平之出蔡之大臣病於楚令之無常將改事晉以利蔡可謂忠計矣當時反曰異謀誤國歡而殺之夫蔡之君臣陷溺於從楚去順效逆不知其非而反以即華為悖冝其錮於黨楚而不返也或謂蔡在春秋中世國勢單弱剪焉無以自通於夏盟然宋虢二會晉楚各以其從交相見蔡公孫歸生首以楚屬攘臂於列國大夫之上而陳鄭莫之敢抗則蔡非不能堅隨北方兄弟之國也靈公有篡弒之惡懼中夏之討奉楚最勤昭四年申之會書曰楚子蔡侯其伐吳滅賴又書曰楚子蔡侯五年伐吳復書曰楚子蔡侯蔡楚之相得未有若靈公之至也閲六年而楚子誘蔡靈公于申矣以為未快也又刑其士七十人矣復未足也而用隱太子岡山矣滅蔡以封棄疾矣蔡之蒙禍亦未有若靈公之極也方蔡人誅公子燮之謀自以事楚為百世之利豈知君戮國夷冡嗣俱屠從楚之報乃至如是哉晉昭公大合八國于厥憖將以救蔡不能振旅反使卑辭請蔡于楚楚虔方張晉既不能弭蔡之難楚虔既殞晉又不能復蔡之祀終焉蔡廬以棄疾之命復國則蔡之存亡廢興皆宅命于楚而中國安得有之乎蔡廬以隱世子之適嗣岡山之痛獨忘之邪流涕而枕戈猶未晚也掩恥事讎則天理絶而人道不能立矣蔡朱東國之廢置專於楚費無極之言夫廢君立君國之大事而楚之小臣得以制之是楚之鄙邑也蔡何國之為蔡昭抱纍世之憾復以一裘一佩之微遭三年拘郢之辱沈玉璧以絶楚質愛子以請晉氣憤而情激使中國有伯雖加惠於蔡伸義於楚則蠻荆無姦夏之患宗國無濟漢之辱矣召陵之役晉人求貨而辭蔡諸侯侵楚之師不出楚人圍蔡之師反至柏舉之戰入郢之師遂使蔡人假手於吳以釋楚憾楚禍既深蔡憂未巳是以哀元年楚復圍蔡使蔡人男女以辨疆於江汝之間蔡之傾覆是懼謀徙州來哭墓而遷君臣相戕以及公孫翩之禍迄春秋以後蔡終為楚所并蓋蔡之依楚如鹿豕逃於餧虎之側將以求安其不噬囓不止也夫以中國諸侯雖有即楚者犧牲待於二竟未有如蔡之附楚而不變者也然蔡之五禍皆楚實為之楚文之執獻舞蔡國十五年無君則蔡之禍一也楚靈之殺蔡般蔡祀嘗絶則蔡之禍二也楚費無極逐蔡侯朱則蔡之禍三也楚子常執蔡昭于郢則蔡之禍四也楚昭遷蔡于江汝則蔡之禍五也故曰蔡事楚愈堅而蒙楚之害愈深也蔡之自絶於中國謂楚之險可恃而齊晉之不能朝夕勤我也然觀蔡文公欲事晉曰先君與於踐土之盟晉不可棄且兄弟也蔡昭公歸郢質子之際可謂決於奉晉矣譬諸草木吾臭味也夫豈不欲從諸夏之列而晉之力亦未能有蔡是以晉之失蔡者三厥憖之會晉中行吳曰不能救蔡物以無親已為盟主而不恤亡國將焉用之子皮之行子産已知其不能救蔡此晉之失蔡一也平丘之會蔡廬失國晉無繼絶之義中行穆子曰楚滅陳蔡晉不能救此晉之失蔡二也召陵之會晉荀吳曰棄盟取怨無損於楚不如辭蔡侯反以伐沈遺蔡之患此晉之失蔡三也故曰蔡二中國最甚而中國亦無力以及蔡也昔周公弔蔡叔之不咸其封蔡仲之册命曰睦乃四鄰以蕃王室以和兄弟使蔡人無荒棄周公之訓捨鬩牆之爭思外禦之謀斯兄弟和而四鄰睦王室尊而僣亂懼則楚雖強大又何畏乎二列國同姓世紀曹曹周曹叔振鐸之後也振鐸文王之昭武王之介弟也武王克商封振鐸于曹凡歷十四世而桓公終生立桓三十五年為魯隱公元年春秋終始曹十五公訖于曹伯陽十五年實魯哀公八年而宋景公滅曹隱元桓公三十五桓五曹始見經州公如曹九曹世子射姑朝十終生卒葬桓公莊公元十四會曹十六會曹莊十四伐宋二十三射姑卒二十四葬莊公戎侵羈出奔陳赤歸僖公元杜預謂羈蓋曹世子也赤曹僖公也為戎所納按世紀曹世家與二十國表僖公名夷則赤非僖公也公羊謂曹羈為曹大夫公穀二傳皆謂赤為郭公未知孰是先儒皆不據公穀之傳多從杜氏觀繼未與突歸于鄭鄭忽出奔衛無異則赤歸當是曹君而僖公當名赤世紀世家年表名夷恐誤二十六殺大夫閔元昭公元僖元次聶北救邢城邢會柳四會侵蔡伐楚會侵陳五會首止盟首止六會伐鄭圍新城救許七班卒葬昭公共公元八會盟洮九會葵盟葵十三會鹹十四城緣陵十五會盟牡次匡救徐伐厲宋伐十六會淮十八伐齊十九盟曹南宋圍二十一會盂二十八晉侵入執伯畀宋襄復歸曹遂會圍許文元襄卒葬共公文公元十一來朝十四會同盟新城十五來朝齊伐入郛宣元會棐林伐鄭三宋圍七會黑壤九會扈十伐鄭十二同盟清十四壽卒葬文公宣公元十七會同盟斷道成二會戰鞍三會伐鄭五會同盟蟲牢七來朝會救鄭同盟馬陵九會同盟蒲十會伐鄭十三會伐秦盧卒于師成元葬宣公曹宣公卒于師曹人使公子負芻守公子欣時逆曹伯之喪負芻殺其太子而自立十五會同盟戚晉執伯歸京師十六伯歸自京師十七會伐鄭同盟柯陵會伐鄭襄元會圍宋彭城會次鄫二會戚會戚城虎牢五會吳戚會救陳會鄬九會伐鄭同盟戲十會吳柤滅逼陽會伐鄭十一會伐鄭同盟亳城北會伐鄭會蕭魚十四會會吳向會伐秦十六會湨梁大夫盟十八會同圍齊負芻卒師武公元十九葬成公二十會盟澶淵二十一來朝會商任二十二會沙隨二十四會夷儀二十五會夷儀同盟重二十六會澶淵二十七會宋大夫盟宋二十九會城把三十會澶淵宋災故昭元會虢十一會厥憖十三會平同盟平十四滕卒葬武公平元十八須卒葬平公悼公元二十會自鄸出奔宋二十五會黃父二十七會扈午卒聲公元經自悼公卒至定公八年書靖公卒聲公隱公經皆不書傳亦無是史記世家悼公朝于宋宋囚之曹立其弟野是為聲公二十八葬悼公三十二會城成周史記世家聲公五年平公弟通弒聲公而代立是為隱公元年定四會召陵侵楚盟臯鼬史記隱公四年聲公弟露弒隱公代之是為靖公元年八露卒葬靖公伯陽元十宋樂大心出奔十一宋樂大心自曹入蕭十二衛公孟彄伐十三衛公孟彄伐哀三宋樂髠伐六宋向巢伐七宋圍鄭駟宏救八宋入以伯陽歸遂滅曹實伯陽十五序曹世紀曰曹者文昭之懿親甸伯之貴爵也春秋書曹不見貶黜之文把以伯爵削而書子秦以伯爵略而從狄穀以伯爵斥而挈名獨曹得始終稱伯辭無所變豈非春秋猶示假借於曹歟然曹之見於經自交乎中國盟會之外曹事之特書者闕焉無幾案公羊謂曹無大夫穀梁謂曹無師何春秋又以曹為不足録而簡之邪嘗考曹國之始末矣其事夏盟最謹其與諸侯甚睦不得罪於中國此曹所以無貶文也其國趨於僻陋安於偷弱不能自立此曹所以不得詳録也春秋之世陳鄭紀薛之邦其從會有常者未能如曹方齊晉主伯列國一離一合而曹之不至者寡矣昭公與會者四共公與會者六文公與會者五宣公與會者八成公與會者十九武公與會者十二悼公與會者二聲隱二公與會者各一可謂事夏盟之最謹矣其會魯者二其朝魯者五其會宋者三曰曹人致餼禮也曰曹即位而來見禮也曰五年而再朝禮也雖更蒙晉宋齊衛之師晉侵者一執者二宋圍者三伐者三衛伐者二齊伐者一而曹自伯國會伐之外未嘗敢一稱師報復於列國可謂與諸侯之甚睦矣其不得罪者此也夫事夏盟之謹則守義而可久與諸侯之睦則得道而多助然姬之在列者曹實先亡不及春秋之終其故何哉蓋曹以僻陋之習行偷弱之政不能自立非一朝夕之故矣或曰曹嘗病於戎嘗困於晉而其先亡也終始實成於宋自曹莊既沒戎實侵曹於是羈以戎出朱以戎歸曹本千乘之邦國有冡嫡戎得亂之向也宋之求多於鄭而晉之不得行於邾者蕞爾之戎乃得以加之於曹是曹之病於戎者然也曹共公襄雖以楚方得曹之故晉文實以私怨行焉既入其國復執其君復分其田終嵗而後復國曹成公負芻雖以殺太子自立之罪晉厲遂以汰心執之既列諸會而復重其討二年而始歸自亰師觀曹使侯獳貨筮史以請共公曰合諸侯而滅兄弟非禮也至曹人之請成公其辭尤憂憤不已曰若之何憂猶未弭而又討我寡君是大泯曹也是曹困於晉者然也自曹莊公以齊命會伐宋遂為宋人不釋之憾夫伐宋非獨一曹也而獨仇曹之深以曹在宋之宇下非他國比僖十五年宋人伐曹傳曰討舊怨也且敵惠敵怨不在後嗣何怨之可討乎僖十九年宋人圍曹傳曰討不服也伐齊之役曹南之盟曹既兩從會矣何不服之責乎宣三年宋師圍曹傳曰討武氏之亂也武穆之禍宋實為之豈曹之有罪乎至曹伯陽之衰宋景用師益亟哀三年書宋樂髠伐曹六年書宋向巢伐曹七年書宋人圍曹八年書宋公入曹以曹伯陽歸矣夫六年之間宋師狎至卒以吞曹蓋曹逼於宋其來固久申之會鄭子産曰曹畏宋必不來曹以逼而素畏於宋宋以強而求多於曹不及并吞寧有已乎是曹之先亡也終始實成於宋者然也然曹茍能以禮義自強其國有賢者相與扶持稍變僻陋之習則曹叔振鐸之澤未泯也豈戎能病之晉能困之而宋景遂得滅之哉春秋之道正本而明微反已而不責人謂國之存亡皆其自致者也善乎鄭渾罕之言曰曹其先亡乎逼而無禮夫禮義明則國不畏逼禮之不立逼而必傾非獨宋景之罪也曹之衰政不詳於春秋嘗觀諸詩矣蜉蝣則刺昭公好奢而任小人無法以自守下泉則疾共公侵刻下民不得其所鳲鳩則刺其在位之無君子候人則刺其近小人而逺君子嗚呼此曹亡國之階也夫曹之四詩三詩刺其棄君子用小人禮義自君子而出者也君子不用何以望其有禮以自強是以曹共公有僖負羈之賢不能知而乘軒者乃三百人曹成公有子臧為曹國社稷之鎮公子不能用而俾之盡致其邑與卿而不出曹伯陽惑田弋鄙人公孫強之謀妄聽辨言而亂舊政背晉姦宋自取滅亡而不悟孟子曰不信仁賢則國空虛無禮義則上下亂國既僻陋而空虛且亂其能有存邪至是而後知春秋以曹為不足録之意也三列國同姓世紀衛衛康叔之後康叔武王之幼弟也成王分殷餘民封康叔于河淇之間實伯爵夷王始命頃侯至武公復受命為公凡十三世當桓公十三年實魯隱公元年春秋始終衛十一公迄于出公之十二年由出公以降十三世而秦并衛隱元桓十三二鄭伐四州吁弒君完伐鄭伐鄭殺州吁于濮立晉宣元蔡衛以天子之近郊創為大變而宋魯陳之君縱不能討反連兵以張其勢夫獨無君父之心哉春秋兩書伐鄭詞繁而不殺其法不獨在州吁矣五葬桓公入郕八遇垂盟瓦屋十入鄭伐戴桓三胥命蒲五從王伐鄭十會桃丘弗遇來戰郎十一盟惡曹鄭忽出奔十二晉卒惠公元年立五年出亡八復入十三及魯紀鄭戰敗績葬宣公十四宋以伐鄭十五會袲伐鄭十六會曹會伐鄭朔出奔齊公子黔牟立十七伐邾莊三溺會齊伐五會齊宋陳蔡伐六王人子突救朔入放黔牟至伐齊來歸俘十四會鄄十五會鄄十六伐鄭會同盟幽二十五朔卒懿公元二十八齊伐及戰敗績閔二狄入戰熒澤遂滅衛衛遺民立戴公卒而立文公文公元僖二城楚四會侵蔡伐楚會侵陳五會首止盟首止六會伐鄭圍新城救許八會盟洮九會葵盟葵十溫子奔十三狄侵會鹹十四城緣陵十五會盟牡次匡救徐十六會淮十八伐齊邢狄伐十九伐邢二十一狄侵二十二伐鄭二十五燬滅邢燬卒成公元葬文公盟洮二十六盟向伐齊二十八晉伐買不卒戍刺之楚救出奔楚會盟踐土叔武鄭自楚復歸元咺出奔晉晉執歸京師元咺自晉復歸三十殺大夫元咺及公子瑕鄭歸衛三十一狄圍遷帝三十二侵狄及狄盟文元晉伐伐晉三會伐沈四寧俞來聘七盟扈衛侯會趙盾九會救鄭十三會沓狄侵十四會同盟新城十五盟扈衛侯十七伐宋會扈宣元晉放大夫胥甲父會棐林伐鄭趙盾二侵鄭六孫免侵陳七孫良夫來盟會黑壤九會扈鄭卒穆公元十齊崔氏出奔伐鄭十二同盟清救陳十四殺大夫孔達十七會同盟斷道十八世子臧伐齊成二及齊戰新築敗績孫良夫及齊戰鞍齊敗績速卒定公元盟蜀三會伐鄭葬穆公孫良夫伐牆咎如孫良夫來聘及孫良夫盟五會同盟蟲牢六孫良夫侵宋七會救鄭同盟馬陵孫林父出奔晉八來媵九會同盟蒲十弟黑背侵鄭會伐鄭十二會瑣澤十三會伐秦十四孫林父自晉歸臧卒獻公元十五葬定公會同盟戚會會吳鍾離十六會沙隨十七北宫括侵鄭會伐鄭同盟柯陵會伐鄭十八會同盟虛朾襄元會圍宋彭城公孫剽來聘二侵鄭會戚會戚城虎牢三會同盟雞澤大夫及陳袁僑盟五會吳善道會吳戚會救陳七宿如孫林父來聘及盟會鄬八會邢九會伐鄭同盟戲十會會吳柤會伐鄭十一會伐鄭同盟亳城北會伐鄭會蕭魚十四會會吳向會伐秦出奔齊殤公元會戚十七會湨梁大夫盟會伐許十六石買伐曹十八晉執石買會同圍齊十九盟祝柯孫林父伐齊二十會盟澶淵二十一會商任二十二會沙隨二十三齊伐二十四會夷儀二十五會夷儀同盟重入夷儀二十六寧喜弒君剽孫林父入戚叛衎復歸衛晉執衛寧喜二十七會宋殺大夫寧喜弟鱄出奔晉大夫盟宋二十八石惡出奔晉二十九衎卒襄公元會城把葬獻公三十會澶淵宋災故昭元會晉楚虢六宋華合比出奔六惡卒靈公元葬襄公十一會厥憖十三會平丘同盟平十八宋衛陳鄭災二十盜殺兄縶二十五會黃父二十七會扈三十二會城成周定四會召陵侵楚盟臯鼬伐鮮虞七晉執結以侵盟沙八晉士鞅侵斯何忌侵盟曲濮九次五氏十晉趙鞅圍會安甫十二公孟彄伐曹十三次垂葭公孟彄伐曹十四公孫戍來奔趙陽出奔宋北宫結來奔會牽世子蒯瞶出奔宋公孟彄出奔鄭十五次渠蒢哀元伐晉二元卒出公元晉趙鞅納蒯瞶于戚葬靈公三圍戚五晉趙鞅伐七晉魏曼多侵十公孟彄自齊歸十一世叔齊出奔宋十二會鄖十三晉魏曼多侵序衛世紀曰春秋諸侯姬在列者衛獨後亡何邪以同姓之尊封疆之大雖在叔世遺澤未泯尚為列國之望二百四十二年之間兵爭之可見者最少賢人君子之著聞者特多介於齊晉大國之間逼而未至於失國良有以也然禮義消亡變故繁興衛之為衛亦有可得而考者吾觀魯以周班而後鄭於衛晉人載書踐土而先衛於蔡衛為同姓之尊可知也受三監之舊竟分七族之餘民封畛土疆始於武父之南至於圃田之北實方伯連帥之地隱公之初以鄭視衛亦曰衛實難也成公以後以晉敵衛猶曰衛不得為次國也末年襄靈之衛至無足道而其出猶可以當晉之千乘入猶可以受晉之五伐豈非其封壤之大有足以自植立者歟異時數大國之爭盟未嘗不以得衛為重自齊桓首倡伯事盟會屢舉而十六年之勤始能得衛晉又踵桓之迹舉動稍異而更五會之信卒未能以致衛其不輕向背如此當春秋之始從王之舉猶曰正也在春秋之終越國之謀猶曰古也不特此爾楚虔稱伯于申而問召陵之典諸侯楚實有之矣衛獨能從容與晉郤楚吳夫差端冠委於黃池以襲成周之籍吳子在而諸侯莫敢不至矣衛亦卒晏然與晉而辭吳蓋其流風遺習尚存所以為列國之望歟乃若中國同好莫不與者亦概可考而惠公之與會者二文公之與會者六成公之與會者二穆公之與會者七獻公之與會者二十五靈公之與會者四自其從齊晉以有事於兵革之外而稱師修怨如伐鄭入郕治曹盟邢不過數事非兵爭視他國最少歟名卿才大夫其可稱者殆不勝計秉翟之人可為王官終寠之士皆為忠臣當獻公之世有事君不二者有能贊大事者有能撫內而營外者季札所以稱其無患者也靈公之世治宗廟有人治軍旅有人治賔客又有人孔子所以稱其奚喪者也夫其季世而人才之見於百執事者猶且若是則干旌之賢臣淇奧之君子其稱於當時者亦可想也非人才視他國猶多歟夫以王室之親受成國之壤而家法未墜獨有以自異於時兵爭之少猶足以輯寧其民人才之多猶足以維持其國蓋魯衛之政兄弟也魯居儒書秉禮之邦春秋之稱望國未嘗不曰魯衛意者康叔武公之治衛亦猶周公伯禽之在魯其典刑文獻隱然未忘固應有是冝其逼於齊晉奔走於強令能據其地執其君臣而未敢於亡其國也雖然禮義消亡變故繁興故更世雖多而爭端不息立國雖久而根本屢搖東門之亂州吁始禍熒澤之變孽朔召釁衎剽並爭適庶舛也孫寧專制上下紊也鱄縶蒙禍兄弟乖也蒯輒出入父子睽也觀詩人記衛之風自頃至文三十有八詩而言男女夫婦者居三之二則本其亂亡之由抑可見矣夫三綱五常立國之本而淪斁如此衛之有名無情其來豈一日之故昔之聞衛風者曰吾聞衛康叔武公之德如是是其衛風乎吁豈非康叔武公之澤源流深長必至於陵夷極盡而後衛從之歟不然孟子所謂無禮義則上下亂衛之後已幸哉四列國同姓世紀晉晉唐叔之後也唐叔武王之穆始封夏墟閲十世而文侯仇輔周東遷以受圭瓉之賜又四世至鄂侯二十年實魯隱公元年六世而文公伯諸夏自是晉主齊盟者十一君迄于定公三十一年乃魯哀十四年自文至定事見晉伯紀其未伯已前事别為晉紀云隱元鄂侯二年初晉昭侯封成師于曲沃邑大于翼翼晉君都也桓叔卒莊伯立弒孝侯晉人立鄂侯卒莊伯代之平王使虢公伐曲沃晉人立哀侯五哀侯元晉侵陘庭陘庭與曲沃武公謀伐晉虜哀侯晉人乃立哀侯小子為君桓三晉侯緡元曲沃武公伐晉侯滅之周僖王命曲沃武公為晉君列於諸侯於是盡併晉地莊十六武公元曲沃武公在位二十七年周僖王命更號曰晉武公始都晉國武公者晉穆公曽孫曲沃桓叔孫也自桓至武公凡六十七年代晉為諸侯十八獻公元獻公八年晉始用士蒍説冬殺故晉之羣公子始都絳僖二滅下陽五殺世子申生執虞公八狄伐九佹諸卒里克殺君子奚齊十里克弒君卓及大夫荀息殺大夫里克十一殺大夫丕鄭父十五及秦戰韓獲晉侯是嵗作爰田晉侯歸作州兵秦始征河東置官司焉二十三年惠公夷吾卒位公子圉立二十四年秦伯納晉重耳弒懷公于髙梁二十四夷吾卒文公定而後告元懷公元文公秦伯納之送衛於晉三千人實紀綱之僕二十五王入于王城晉侯朝王圍原二十七搜于被廬作三軍謀元帥明年始伯序晉世紀曰晉之為國舊矣入春秋逾六十年昉見於經僖二年晉滅下陽是也晉以武穆之近親受陶唐之奧都冠冕乎侯伯之列而書法之詳乃不得與鄭衛同目鄂侯二年為春秋之始及乎重耳以前凡六世矣按左氏晉之䇿書登載至繁非無可繫之事也周之東遷曰晉鄭焉依非無可録之功也武公代興事端轇轕非無可紀之變也春秋皆略而不書八十餘年間晉事之存乎經者僅十見不過執滅之暴誅弒之惡秦狄戰伐之辱而已夷考諸傳桓二年曲沃伐翼七年春曲沃誘晉小子侯殺之八年春滅翼冬王命哀侯之弟緡于晉莊十六年冬王命曲沃伯為晉侯此非變端之可紀歟莊十八年春晉侯朝王晉侯使原莊公逆王后于陳僖十一年晉侯平戎于王非其功之可録歟莊二十六年夏晉城絳閔元年晉作二軍晉伐臯落氏僖十五年晉作爰田晉作州兵冬晉侯歸自秦二十四年秦伯納重耳此非事之可繫歟聖人作經何削之若是其嚴春秋之法所以代一王之賞罰存萬世之綱常曲沃滅翼支孽之逼輒傾宗國東周刑政不行反加寵命彛倫攸斁人紀何觀子孫象之遂有里克之亂申生之禍君臣父子不能相保由傳考經則知聖人微其事而不書存其惡而自著撥亂反正之道反覆晉事而可觀及觀列國之詩晉風自蟋蟀而下十有二篇皆僖昭武獻之詩自重耳而後咸缺焉蓋詩與春秋詳略互見褒貶自章以武獻之事不足録乎春秋也故詩特詳之椒聊則言曲沃之強盛蕃衍而曲致其隱傷之辭無衣則著武公之并國不安而極道其愧惕之情枤杜采苓等詩無非刺其行事之非凡晉人之悖理傷道春秋略之者觀乎國風可以參見矣武獻之為國非不盛也當齊桓九合之時晉之君大夫不交於盟會葵丘如會不至而還晉以不義得國方新歉歉乎懼人之有辭於已也是以阻居深山王靈不及禮樂之事曽無聞焉至乎重耳之伯而後改物遂能駕楚世主夏盟然重耳復國之初經猶未之録也僖二十五年晉侯朝于王城無以異乎朝于王所也晉侯圍原無以異乎遂圍許也皆不得見於經重耳入國雖正未受天子之命亦猶武公耳故僖二十七年以前晉事不著乎春秋者聖人扶人紀存綱常之法二十八年以後晉事詳列乎春秋者聖人憂中國録伯功之例也五列國同姓世紀鄭鄭之始封自桓公桓公乃厲王之昭宣王之弟也自桓公寄帑於虢會武公從王東遷卒定其地而食溱洧焉莊公繼立二十二年當魯隱公元年實春秋之始閲世十四至聲公二十年當魯哀公十四年為春秋之終聲公以降歷七世而韓滅鄭隱元莊公二十三克假于鄢二伐衛三盟石門四宋陳蔡衛伐翬會伐五宋伐圍長葛六來渝平八宛來歸祊我入祊十會中丘會伐宋宋衛入宋蔡衛伐戴伐取之入郕十一會時來入許桓元會垂璧假許田盟越二會稷成宋亂會鄧五如紀蔡衛陳從王伐鄭繻葛之戰射王中肩十來戰于郎十一盟惡曹寤生卒葬莊公厲公元宋執祭仲突歸忽出奔衛十二盟武父伐宋戰宋十三及四國戰四國敗績十四會曹弟語來盟宋以四國伐十五突出奔蔡世子忽復歸昭元突入櫟四國會袲伐十六會曹會伐至伐十七髙渠彌弒昭公立公子亹十八齊人殺子亹祭仲迎鄭子于陳而立之莊四遇垂十四會鄄厲公復元鄭厲公自將侵傅瑕殺鄭子而立厲公十五會鄄十六宋齊衛伐荆伐會同盟幽十七齊執詹詹自齊逃來二十一突卒葬厲公文公元二十七會同盟幽二十八荆伐會齊宋救二十九侵許閔二棄師僖元楚伐會柳二楚侵三楚伐四會侵蔡遂伐楚次陘會侵陳五會首止盟首止六會伐圍新城至伐七齊伐殺大夫申侯會世子華盟寧母八盟洮乞盟九會葵丘盟葵丘十三會鹹十四城緣陵狄侵十五會盟牡邱次匡救徐十六會淮十九盟齊二十入滑二十一會盂二十二宋衛許滕伐二十四狄伐天王出居二十七圍宋盟宋二十八會盟踐土會溫圍許三十秦晉圍三十二捷卒穆公元三十三伐許文二會盟垂隴三會伐沈七會盟扈鄭伯九楚伐晉救十三會棐十四會同盟新城十五盟扈鄭伯十七伐宋會扈宣元侵陳遂侵宋四國會晉棐林伐晉宋伐二宋及戰大棘宋敗績四國侵三楚侵蘭卒靈公元葬穆公四歸生弒君夷襄公元楚伐五楚伐七會黑壤九會扈楚伐晉救十四國伐楚伐十一盟辰陵十二楚圍十四晉伐成二侵衛盟蜀三四國會伐至伐去疾伐許伐許四堅卒悼公元葬襄公伐許五會同盟蟲牢六費卒成公元楚嬰齊伐晉欒書救七楚嬰齊伐九國會救同盟馬陵九會同盟蒲晉執伯欒書伐圍許十衛弟黑背侵六國會伐是嵗鄭人改立君晉侯伐鄭而歸其君十三會伐秦十四喜伐許十五會同盟戚楚伐十六喜侵宋戰鄢陵敗績尹子四國會伐十七衛北宫括侵尹單七國會伐同盟柯陵單子七國會伐至伐十八伐宋侵宋襄元晉韓厥伐二伐宋睔卒僖公元晉宋衛侵會戚會戚遂城虎牢三會同盟雞澤及袁僑􅉀五發來聘會吳戚會救陳七會鄬髠頑未見卒于鄵簡公元八葬僖公侵蔡獲燮會邢楚貞伐九十二國會伐同盟戲楚伐十伐宋十二國會伐盜殺騑發輒戍鄭虎牢楚貞救至伐十一舍之侵宋十二國會伐同盟亳城北至伐伐宋十二國會伐會蕭魚楚執良霄十四十三國會會吳向十三國會伐秦七國會戚十六十一國會湨梁大夫盟十八會同圍齊楚午伐十九盟祝柯殺大夫嘉二十會盟澶淵二十一會商任二十二會沙隨二十四會夷儀楚蔡陳許伐二十五會夷儀舍之入陳同盟重夏伐陳二十六會澶淵楚蔡陳伐二十七會宋大夫盟宋二十九十一國會城把三十良霄出奔許自許入殺良霄十二國會澶淵宋災故昭元晉楚十一國會虢二殺大夫黑四會申十一會厥憖十二嘉卒定公元葬簡公十三會平同盟平十八宋衛陳鄭災二十五會黃父二十八寧卒獻公元葬定公三十二十一國會城成周定四十八國會召陵侵楚盟臯鼬楚囊瓦出奔六遊速滅許以斯歸公侵至侵七盟鹹八晉士鞅侵盟曲濮九蠆卒聲公元葬獻公十會安甫十一及平叔達如蒞盟十四公孟彄出奔十五罕達伐宋哀二晉趙鞅及罕達戰鐵鄭敗績七宋皇瑗侵駟宏救曹九宋皇瑗取師雍宋伐十宋伐十一陳轅頗出奔十二宋向巢伐十三罕逹取宋師于嵒序鄭世紀曰觀春秋之世變於鄭蓋可觀矣鄭之為國邇於周畿而介乎齊晉楚之間方其初也一舉動而係王朝之輕重及其後也一向背而關中外之盛衰鄭固春秋要領之國然鄭在隱桓之春秋王室之罪人在莊僖以後之春秋伯者之罪人也在襄昭以後之春秋當時諸侯之罪人也觀周桓公言於王曰我周之東遷晉鄭焉依王子朝告於諸侯之辭亦曰惠襄之難則有晉鄭咸絀不端鄭疑未有罪於王室也然由君子之論夾輔之績不足以贖交惡之誅綏定之美不足以掩敵戰之惡況入春秋以來未有言克其弟者而克假之舉始冒周官賊親之刑未有言伐人國者而伐衛之師始蹈敵國相征之禁未有言歸人邑而歸祊之謀始犯諸侯專地之戒當是之時列國爭兵曽未有先莊公以詭譎之雄日爭尋常以盡其民蓋未足論也而殱天倫墮王法之大者皆昉於鄭焉以先王之禮考之鄭豈非王室之罪人歟莊僖之後王政日微矣堅事伯主以蕃王室是猶愈於事楚也而鄭之君臣念不及是借曰泓不振旅是宋襄之所以失鄭邲不復從是晉景之所以不克爭鄭棐林之役伐而不從猶曰晉實不競鄢陵之役勝而不服猶曰晉實不德而盟幽未幾亟有鄭詹之執召陵既退尚勤新城之圍是何邪又況戰城濮之明年遂敢於背翟泉之盟城虎牢之十載姑黽勉聽命於蕭魚之集以為晉楚之間強令是從則文公一戰之威非楚匹矣以為晉楚無德來者是與則悼公五會之信非楚敵矣鄭何難於背楚何易於棄晉若是哉是則從楚者鄭之欲也昔成王命太公曰五侯九伯女實征之平王命文侯曰與鄭夾輔周室毋廢王命以先王之訓考之鄭又豈非伯者之罪人歟然襄昭以後宋盟申會諸侯兩屬於晉楚者二十餘年自是晉楚俱弱無力爭之事鄭宜有以立國矣而復附齊衛抗晉宋終嵗勤動迄無所成考其一國之政乃冥冥轉移於七穆之手蓋子駟之専移之於子孔子孔之誅則移之於伯有伯有之誅則移之於子晳櫜甲以爭室而不暇問矯盟以専伐而不能禁非子産補弊支傾任忠才斃強侈以救之鄭之亟亡不待數世之後矣末年宋公子地之叛而大夫為老丘之役以奬地晉趙鞅之亂而大夫為鐵之役以助鞅是鄭國惟大夫之所為當時田氏專齊三家擅魯六卿兮晉七穆有鄭蓋相視而莫相正也然諸侯無專殺而殺有罪者與之無外討而討有罪者善之繩以春秋之法則鄭又豈非諸侯之罪人也歟夫以二百四十二年之鄭君臣上下相與謀其國者始於上陵終於下抗中於從于強令無一可以為長世保民之道欲後亡得乎抑嘗觀之詩鄭風二十有二篇清人而下五詩皆刺其不能逺小人而近忠賢雞鳴而下五詩皆刺其失婚姻之道無室家之節夫不信仁賢則國空虛無禮義則上下亂鄭胥有之矣渾罕之言曰鄭先衛亡逼而無法以經考之鄭之先亡豈直無法之罪哉六列國同姓世紀滕滕周叔繡之後叔繡為文王之昭周公封建親戚而國之滕入春秋至魯隱公七年滕始見經而不名自文至隱以名通者五君隱公實卒于哀十一年後四年而春秋終隱七滕侯卒十一來朝桓二滕子來朝莊十六會同盟幽僖十九宋執嬰齊宣九滕子卒文公元宋圍十宋伐成十三會伐秦十六滕子卒成公元襄元會圍宋彭城二會戚城虎牢五會吳戚六來朝九會伐鄭同盟戲十會會吳柤會伐鄭十一會伐鄭同盟亳城北會伐鄭會蕭魚十四會會吳向會伐秦十八會同圍齊十九盟祝柯二十會盟澶淵二十四會夷儀二十五會夷儀同盟重二十九會城把三十會澶淵宋災故三十一來會葬昭三原卒悼公元叔弓如滕葬成公四會申十三會平同盟平十五會黃父二十七會扈二十八寧卒頃公元葬悼公定四會召陵侵楚十五來會葬哀四結卒隱公元葬頃公十一虞母卒葬隱公序滕世紀曰滕地不大於邾莒民不衆於紀薛而以文昭之懿戚受侯爵之顯封當隱桓之春秋嘗以侯書於經矣然其始稱爵而沒其名其後稱名而貶其爵是果何邪夫宿男不名以為微之把侯貶爵以為外之春秋之所為不足於滕者必有意也滕事不詳於經其本末可考者五君而已其與諸侯之睦事伯主之謹猶可槩見也何謂與諸侯之睦春秋未有書國君會葬他國者而書滕之會于魯者二未有書國君朝於小國者而書滕之朝魯者五自曹莒邢邾之小國其爭城爭地皆嘗從事於干戈之釁而二百餘年間滕獨無稱兵修怨之事其與諸侯可謂睦矣何謂事伯主之謹方齊桓之伯滕之會盟者一宋襄之伯滕之從伐者一晉文之伯迄於靈成之世滕不一列於經意其國小而逼猶未能數從諸侯之事也自晉厲以後凡晉合諸侯一則曰滕之大夫皆至二則曰滕之大夫皆會故文之會晉者一成之會晉者十六悼之會晉者三頃之會晉者一自陳許蔡鄭之大夫其一從一違往往未能一意於中國之好事而六十年間滕獨無盟之不與無役之不從則其事伯主可謂謹矣春秋惡爭鬬重輯睦滕之無爭於諸侯無惡於伯主宜未得罪於春秋也而春秋不足於滕果何意邪以其國之亟亡邪滕之逼於宋畏於齊楚而不能國亦勢使然也宋襄之執滕曰討其不服宋也宋文之圍滕曰討其不事宋也滕誠有罪矣不省其國而執其君不矜其禍而圍其國不幾於無道行之乎至宋之盟叔孫豹曰滕宋私也成周之城仲幾亦曰滕宋役也非其逼於宋者然歟異時滕文公曰滕小國也事齊乎事楚乎故嘗以之楚而過宋則不惟畏宋而猶畏楚嘗以聞築薛而恐於齊則不惟畏楚而且畏齊是不特惟文之世為然耳自戚之會七國皆在而滕之不至曰以齊故也申之會四國不來而滕之不敢不至曰以楚所及也非其畏於齊楚者然歟然則松柏之下其草不殖滕之亟亡非滕之罪也然滕之亟亡則亦有故矣蓋滕以文王之子孫與魯衛兄弟也故家遺俗流風善政寧無一二之僅存可以保固而持其世哉今觀渾罕之言乃以滕之先亡亦出於逼而無禮滕之弊政雖不詳於經自春秋之初于魯旅見而禮典已紊與薛爭長而班爵已墮喪紀之莫行經界之不正循習僻陋是不一世則典章文物之廢壞其來久矣是以國君無名君無道也會朝稱子君無禮也凡先王之餘澤一切淪胥於夷狄而不復見則滕果何所恃以立國乎夫以滕壤地褊小介於數大國之間而無禮以固其國是春秋之不足於滕也歟七列國同姓世紀邢邢周公之胄也周公弔二叔之不咸而始封焉入春秋六十有一年而見伐於狄齊桓公逐狄人而城之後二十八年而卒滅於衛莊三十二狄伐閔元齊救僖元次聶北救遷夷儀齊宋曹城十六會淮十八伐衛十九衛伐二十齊狄盟二十五衛燬滅序邢世紀曰吾觀於邢而後知亡國之自取也夫邢周公之後嘗為狄所滅矣齊桓城邢而春秋大之則邢衛之宗也而衛文滅邢春秋宜如何而惡之經書衛侯燬滅邢衛之罪著矣雖然列國之事滅人者罪易見滅於人者罪難知春秋之法端本而後末正已而後責人則書邢之見滅於衛邢獨無罪乎觀春秋書邢之本末而求其所以亡則罪之在衛者三在邢者五不可不察也何謂衛之罪懷怨以謀人國罪之一伐夲以滅同姓罪之二文公稱有道之君而仕二禮殺國子挾詐以掩人之不疑罪之三此罪之在衛者也何謂邢之罪邢方無道衛有令政以邢伐衛是不度德矣邢蕞爾小國而衛為大邢之盟實主乎伐衛是不量力矣衛以文昭之親邢則兄弟之邦不知比衛而數尋師以修怨不親親矣伐齊之役實始於宋釋甗之憾宜不在衛而乃舍宋而治衛是不察有罪矣是雖均之為罪然豺狼之人非我族類忘其世仇而同之於與國以仇謀新所以深衛之忿而速邢之亡則罪之尤大者歟觀罪之在邢者如此則衛之滅邢豈直衛侯之罪哉詩云騂騂角弓翩其反矣兄弟婚姻無胥逺矣爾之逺矣民胥然矣邢之伐衛其為反也不亦甚乎衛之滅邢其為然也不亦宜乎是聖人之所以書邢之意八列國同姓世紀郕郕周叔武之後文王之昭也武王克商封叔武於郕按史記世家云武叔其後世無所見其事之書於春秋僅如此隱五衛入十齊入桓三公會把于郕莊八師及齊圍郕郕降齊文十二郕伯來奔序郕世紀曰郕之事書于經者四考其始末一入於衛再入於鄭終圍於齊魯於是而降於齊又七十一年而經書郕伯來奔遂終春秋無書郕之文吁宋人遷宿是無宿也齊人降鄣是無鄣也然則郕降於齊其猶有郕歟意者降齊而遂為之附庸是以久不見于經也然吾觀左氏謂太子朱儒未立以地奔魯而春秋書伯以尊之則豈其然乎夫專地以叛不宜沒地因爵以逆不必書爵也庶其竊邑纍書閭邱曹會專地特書自鄸入櫟書國著有國也奔衛稱子明不君也朱儒稱伯豈世子而專邑之稱乎是必不然矣然書朔奔齊罪在朔也名朱奔楚罪在朱也紀侯去國用以責齊衛侯適楚書以過晉郕以文昭之懿親受甸伯之貴爵既降於齊而為之屬亦曰將復五廟以存姑姊妹也而棄國適魯得無罪乎而春秋曷為不名之也則亦必有故矣郕之託於齊何啻犬豕遁於餧虎之側不至噬囓寧有已邪昔滕文畏齊楚而問孟子孟子告以大王居邠之事以為君子不以飬民者害民郕伯以國屬齊而猶不得免則其之魯也誠未有罪耳雖然大王居邠而益大郕伯奔魯而益微則大王之事逺矣若夫興滅國繼絶世是聖人之事春秋書郕伯之爵抑亦周公大封同姓之意九列國同姓世紀微國傳云武王克商光有天下兄弟之國十有五人姬姓之國四十人春秋之世存者蓋無幾矣而同姓大國又日以吞併諸姬為事故見於經者僅如此桓二取郜鼎于宋十二公會宋公燕人于榖十三及齊宋衛燕戰莊十六滑伯同盟幽僖二虞晉滅下陽虢邑五晉執虞公二十二郜子來朝共四國序同姓微國紀曰周家封國八百同姓五十逮乎春秋之始才三百四十年耳而周之子孫抑何其甚微邪小國弱兵介乎強侯之間僅若黑子之著面而地大民衆以臨蕞爾之國奚啻瘠牛之僨豕故郜畏魯衆齊迫燕弱漢陽諸姬楚實盡之虞虢焦滑霍楊韓魏皆姬姓也晉皆兼之然則周之子孫安得不日失其序乎嗚呼齊楚之人狡焉思啓封疆至於芟夷併吞固無足怪而同姓大國恃其強力亦往往自尋斧於本支何邪吾觀先王之時大比小強比弱同姓無甚強大之國也宜若不足恃而脈絡聯附垂五六百年而未亡春秋以後小并於大弱并於強同姓無甚弱小之國矣宜可以久立而卒之肱髀分披不能一二百年而天下無復周之子孫論至於此則先王大封同姓之意大小相維之制所以為保民長世之道豈可誣哉豈可廢哉十列國先代之後世紀陳陳舜之後也周武王克商始封媯滿於陳是為胡公閲世十一至桓公二十有三年為魯隱公元年春秋終始陳十二公當魯昭公八年楚師滅陳五年而復封迄閔公十九年實魯哀十四年後十五年而卒滅於楚隱元桓二十三年四伐鄭翬會伐鄭桓二會稷成宋亂五甲戌己丑鮑卒厲公元甲戌己丑猶十二月再書丙戌也或曰諸侯多有厯如宋用商厯晉用顓厯魯用周厯日之差或者厯之異歟葬桓公從王伐鄭六殺他桓公元十一會盟折十二躍卒莊公元十四宋以伐鄭十五會袲伐鄭十六會伐鄭莊元林卒宣公元二葬莊公四遇垂五伐衛八次郎以俟十三會北杏十四伐宋十五會鄄十六會同盟幽十九結媵婦于鄄伐我西鄙二十二殺禦冦敬仲奔齊二十五女叔來聘友如陳二十七會同盟幽友如陳葬原仲僖四會侵蔡伐楚齊執轅濤塗及江黃伐會侵五會首止盟首止六會伐鄭圍新城遂救許七會盟寧母世子款八會盟洮十二杵臼卒穆公元十三葬宣公會鹹十四城緣陵十五會盟牡丘大夫救徐十六會淮十九會盟齊二十一會盂會盟薄二十三楚伐二十五楚圍納頓子二十七圍宋盟宋二十八踐土如會款卒共公元陳子會溫遂圍許二十九會盟翟泉三十三伐許文二會盟垂隴伐秦三會伐沈六行父如十三朔卒靈公元十四會同盟新城十五盟扈傳陳侯宣元楚侵晉救會棐林伐鄭二侵鄭六晉趙盾衛孫免侵八楚伐九殺大夫泄冶十夏徴舒弒君平國陳夏舒弒君而自立明年楚殺夏舒乃復封陳十一盟辰陵楚殺夏舒楚入納公孫寧儀行父成公元十二葬靈公宋伐衛救成二盟蜀陳人襄三雞澤袁僑如會大夫盟四午卒哀公元葬成公圍頓五會吳戚戍陳楚貞伐會救至救七楚貞圍會鄬逃歸十七宋伐二十三殺大夫虎寅弟黃自楚歸二十四楚蔡陳許伐鄭宜咎出奔楚二十五鄭舍之入陳鄭夏伐二十六楚蔡陳伐鄭二十七孔奐會宋昭元會晉楚虢四楚會申楚八國伐吳五楚八國伐吳八弟招殺世子偃師溺卒楚執于貞師殺之留出奔鄭殺大夫過楚滅執招放越殺孔奐葬哀公傳是滅陳立穿封戌為陳公後三年楚滅陳蔡城陳蔡不羮平王即位後封陳蔡立悼公之子吳為陳侯九叔弓會楚于陳陳災十三吳歸于陳惠公元自哀公卒五年而惠公立十八宋衛陳鄭災二十三吳敗六國師于雞父獲夏齧定四吳卒懷公元會召陵侵楚盟臯鼬葬惠公十四楚陳滅頓以牂歸哀元圍蔡六吳伐九楚伐十楚結伐吳救十三楚伐盜殺夏區夫序陳世紀曰春秋諸侯迫於從楚者陳蔡一也春秋書蔡事為特略其始末可見者惟六君陳十二公悉著于册稽其行事視蔡尤詳焉聖人不少假借於宗盟之長而獨未深貶絶於胡公之陳是何邪陳國於荆河之地實邇強楚而逺齊晉其汙於荆蠻或者非其得已試考之經共靈以前陳之事中國者十九成哀以後陳之事中國者十一陳之堅於事楚大抵不得不畏楚而中國之易於失陳往往自不能以有陳爾何者陳在春秋之始從王伐鄭猶修勤王之職盟折會稷猶與諸侯玉帛之好伐衛伐鄭猶偕諸侯兵車之會齊桓之伯自盟幽以至于會淮其從齊者九晉文之伯自踐土以至翟泉其會晉者三濤塗雖執而首止之盟猶列陳侯穆公雖卒而溫之會猶序陳子獨宋襄之暴陳始從楚而會盂之後屢動楚人之兵晉靈之懦陳再與楚而棐林之後始荐勤晉師之討非共靈以前陳之從中國嘗十九歟自少西之難晉不加討楚遂得以專辰陵之盟邲之役晉不振旅宋曽不得以實清丘之言於是陳一意向楚矣蜀之役借曰竊盟而雞澤之集奚復後會乃至會戚以戍陳固悼公之勤陳也會棣城以講陳固悼公之勤陳也而圍頓之師雖嘗勇於從晉逃鄬之行乃尋快於與楚何邪異時歸黃于陳惟曰楚故戮二慶於陳亦惟曰楚故招之放過之誅亦惟曰楚故伐鄭伐吳惟楚是贊會申會虢惟楚是從甚而陳之滅陳之封亦惟楚令是聽蓋無異楚之鄙邑矣末年夫差爭伯陳不從楚則又移於從吳終春秋之世獨召陵一會暫從於晉他無聞焉非成哀以後陳之從中國者十一歟然楚人爭陳之迹不見於齊晉方盛之時而陳人從楚之事乃亹亹相繼於晉楚爭衡之日則亦可以求其故矣大抵中國之不抗於楚其説常有二焉志怠者不能為力弱者不敢為也吾觀范宣子之言曰楚人改行而疾討陳陳近於楚民朝夕急能無往乎於是不復有事於陳夫晉君方明六卿無缺不能張其威以治楚而安於棄陳者怠孰甚乎中行穆子之言曰不能救陳又不能救蔡物以無親晉之不能又可知矣於是始欲舍陳而救蔡而偃師蒙禍國內無討不能明大義以懷陳而甘於不敢抗楚晉弱孰甚乎由是觀之陳不得不畏楚往往亦中國之自不得以有陳也明矣是則陳以神明之後為周建國污於荆蠻亦可以察其情矣兹春秋所以書陳之事獨異於蔡而不至於甚略之歟雖然陳之所以自立其國者果何如邪夫禮義茍明國不畏逼陳之敝政見於經者不一而詩之所載尤深切著明焉蓋陳風九詩言君臣上下之淫亂者七以蕞爾之陳在荆尸之宇下而立國如此是何怪其奔走於強令而不知棄夏即楚之為恥哉昔滕畏齊楚而孟子告以為善蔡逼於楚曹滕逼於宋而渾罕皆歸咎其無禮使陳人不失其治國之道無根本先撥之憂則國無小不可易也荆楚雖大何畏乎十一列國先代之後世紀把把夏后之餘也武王克商封東樓公於杞八世為惠公實當春秋之初又八世而春秋終又八世而把亡實見滅於楚後陳之滅三十四年隱元惠公四莒伐取牟婁桓二來朝入把三會郕十二會盟曲池莊二十五伯姬歸二十七會伯姬洮伯姬來來朝把入春秋稱侯至是稱子杜注云為時王所黜也僖五伯姬來朝其子十三會鹹傳淮夷病杞故十四城緣陵遷把二十三杞子卒傳書曰子杞夷也二十七來朝用夷禮故曰子遂入把二十八伯姬來三十一伯姬來求婦文十二來朝成五叔姬來歸會同盟蟲牢七會救鄭同盟馬陵杞桓公八叔姬卒九伯來逆叔姬之喪以歸會同盟蒲十八來朝襄元會次鄫六姑容卒葬桓公九會伐鄭同盟戲十會會吳柤會伐鄭十一會伐鄭同盟亳城北會伐鄭會蕭魚十四會會吳向會伐秦十六會湨梁大夫盟十八會同圍齊十九盟祝柯二十會盟澶淵二十三會沙隨二十三丐卒文公元葬孝公二十四會夷儀二十五會夷儀同盟重二十九會城把來盟三十會澶淵宋災故昭六益姑卒平公元葬文公十一會厥憗十三會平同盟平二十四郁釐卒悼公元葬平公二十六會盟鄟陵三十二會城成周定四會召陵侵楚盟臯鼬伯卒于會僖公元葬悼公哀八過卒湣公元葬僖公序把世紀曰春秋之法僣亂之國不列于諸夏所以辨內外正名實也吳以大伯之後或貶而稱國楚以熊繹之後或黜而書州晉武穆也而或挈晉鄭厲昭也而或挈鄭凡以外之云耳杞先代之後而即東夷豈非春秋之所甚貶歟然考之經把之書子者二侯者三人者五伯者二十八筆削褒貶若無定法何也以為時王之所豫奪歟則是禮樂征伐猶出於天子而不為東周矣以為因魯史之記而無增損歟則是進退賞罰無假於聖人而習讀問傳者無所質正矣聖人之且進且絀者豈無意哉觀杞之為國逼於莒困於夷自桓公以前獨有魯好孝公以後咸從晉役亦諺所謂蕞爾國也何則春秋之初牟婁之取見陵於莒而曲池之平借助於魯夫伐而不敢怨乃求好焉是其逼於莒可知鹹之會諸侯盡行為謀把故緣陵之城諸國雜至亦為謀把故凡以淮夷之病杞而謀之則其困於夷可知也一入於魯而因以求成再朝於魯而繼以蒙討君之朝者六子之朝者一婚姻之好相繼於再世赴告之禮不替於七君蓋後乎桓公則無是也乃若晉自文公之伯猶未嘗勤把於一役景公之伯亦僅能致把於三會而悼公以後從於盟者八從於會者十有五鄫之次遂能舉偏師以勤伯成周之役遂能偕列國以奬王蓋前乎孝公亦未有是也考其與四國離合去就之故雖未免於畏逼而周旋於鄰好奔走於伯令猶未至得罪於中國是聖人所為不盡貶於把歟曰非也把先代之後而即東夷文獻不足證聖人深惜之當春秋之季微之小邾猶能誦成王之雅夷之為郯尚能歷記少皥之名官宋先王之後賔祭之禮未至遽亡魯周公之子孫易象春秋之書卓有可見杞亦先代之嗣耆老之賢文物典章之懿亦常有一二之足證者乎左氏曰杞用夷禮蓋其廢禮久矣試嘗觀經自莊僖以來會于洮而室家之禮廢朝其子而朝廷之禮廢求婦於魯婚禮失矣逆喪於魯喪禮舛矣先代舊章無一可考猶謂國有人乎春秋不貶之則廢禮也烏可以不貶遽起而絶之則以先代之後不忍絶也故書侯書伯書子書人因其善惡而著之春秋之法行而聖人之情見矣不然把既廢先王之禮何不直外之而且進且絀哉十二列國先代之後世紀宋宋微子之後也周公誅武庚分殷餘民封微子於宋傳十三世當穆公七年為魯隱公元年春秋終始宋十三公迄於景公三十六年實魯哀公十四年自景七世偃僣稱王齊魏楚共滅之襄伯中國事在宋伯襄紀餘别為宋世紀云隱元穆公七盟宿三和卒殤公元葬穆公四遇清四國伐鄭翬會伐五邾鄭伐伐鄭圍長葛六取長葛八遇垂盟瓦屋十翬會伐公敗宋菅取郜取防三國伐戴鄭伐取之桓二督弒君與夷及大夫孔父莊公元會稷成宋亂取郜大鼎于宋十一執鄭祭仲會盟折會夫鍾會闞十二會盟穀會虛會龜及鄭伐宋戰宋十三公會紀鄭及戰敗績十四以四國伐鄭十六會曹會伐鄭十七及宋衛伐邾莊二馮卒閔公元三葬莊公五五國伐衛十侵宋遷宿齊宋次即敗乘十一敗鄑大水十二萬弒君捷及大夫仇牧萬出奔陳桓公元十三會北杏十四齊陳曹伐單伯會伐會鄄十五會鄄伐郳鄭侵十六伐鄭會同盟幽十九結及齊宋盟伐我西鄙二十六會伐徐二十七會同盟幽二十八會救鄭三十二遇梁丘宋大水魯往弔災故書救災恤鄰先王所以一天下也列國之所以通行而不可已者許不弔災君子知其先亡春秋之世猶有先王之遺風者數事若弔災若賑糴若兵交使在其間若仇國會葬僖元次聶北救邢城邢會柳二盟貫三會陽穀四會侵蔡伐楚盟召陵會侵陳五會首止盟首止六會伐鄭圍新城救許七會盟寧母八會盟洮九御説卒襄公元會葵丘宋子盟葵十三會鹹十四城緣陵十五會盟牡丘次匡大夫救徐伐曹十六隕石五六鷁退飛過都會淮十八年至二十三年事見宋伯襄紀二十四成公元蕩伯姬來逆婦殺大夫二十七楚圍宋會盟宋二十八晉執曹畀宋戰城濮楚敗績會盟踐土會溫遂圍許二十九盟翟泉文二會盟垂隴三會伐沈雨螽七王臣卒昭元殺大夫會盟扈八殺大夫司馬司成來奔九會救鄭十狄侵十一遂如宋十四會同盟新城子哀來奔十五司馬華孫來盟會扈傳宋公十六宋人弒君杵臼文公元十七晉衛陳鄭伐會扈平宋宣元楚侵會棐林伐鄭伐鄭二華元及鄭歸生戰大棘宋敗績獲華元四國侵鄭三圍曹七會黑壤九會扈圍滕十伐滕四國伐鄭十二同盟清丘伐陳十四楚圍十五歸父會楚于宋及楚平成二鮑卒共公元楚盟蜀三會伐鄭葬文公四華元來聘五蔑如宋會同盟蟲牢六衛良夫侵七會救鄭同盟馬陵八華元來聘壽來納幣九會同盟蒲伯姬歸宋行父如宋致女十會伐鄭十三會伐秦十五會同盟戚固卒平公元葬共公華元出奔晉自晉歸宋殺大夫山魚石出奔楚會會吳鍾離十六鄭公子喜侵華元會沙隨十七會伐鄭同盟柯陵會伐鄭十八楚鄭伐魚石復入彭城楚鄭侵會同盟虛朾襄元會圍宋彭城楚壬夫侵二鄭伐三國侵鄭會戚豹如宋會戚遂城虎牢三會同盟雞澤及袁僑盟五會吳戚戍陳會救陳七會鄬八會邢九宋災會伐鄭同盟戲十會會吳柤楚鄭伐會伐鄭戍鄭虎牢十一會伐鄭同盟亳城北楚鄭伐會伐鄭會蕭魚十二楚貞侵十四會會吳向會伐秦會戚十五向戌來聘及向戌盟劉十六會湨梁大夫盟會伐許十七伐陳華臣出奔陳十八會同圍齊十九盟祝柯二十會盟澶淵宿如宋二十一會商任二十二會沙隨二十四會夷儀二十五會夷儀同盟重二十六會澶淵殺世子痤二十七九國會宋大夫盟宋二十九會城杞三十宋災伯姬卒叔弓如宋葬共姬會澶淵宋災故昭元會晉楚虢四楚會申六華合比奔衛十成卒元公元十一叔弓如宋葬平公會厥憖十二華定來聘十三會平同盟平十八宋衛陳鄭災十九伐邾二十曹會自鄸出奔宋亥寧定出奔陳二十一亥寧定自陳入南里叛二十二亥寧定自南里出奔楚二十五婼如宋會黃父佐卒于曲棘景公元二十六葬元公二十七會扈三十二會城成周定元晉執仲幾于京師四會召陵侵楚盟臯鼬六晉執樂祁犂十樂大心出奔曹地出奔陳弟辰暨他彄出奔陳十一辰他彄地自陳入蕭叛樂大心自曹入蕭十四衛趙陽出奔齊會洮衛世子蒯瞶出奔弟辰自蕭來奔十五鄭罕達伐哀三樂祁伐曹四執小邾子五齊伐六向巢伐曹七皇瑗侵鄭圍曹八入曹以曹伯歸九皇瑗取鄭師雍丘伐鄭十伐鄭十一衛世叔出奔十二會鄖向巢伐鄭十三鄭罕達取宋師于嵒序宋世紀曰宋先代之後也春秋書宋之事嘗多假借之文若外災不書而宋獨書外異不記而宋獨記凡以異之也列國會盟自陳以舜後而嘗後於蔡把以夏餘而嘗不先於邾二百四十二年之中獨宋常書公以列於諸侯之上其尊之也亦至矣春秋之所以拳拳於宋者果何意哉以宋為聖人之故歟則春秋非一家之史不宜獨私宋也以宋爵諸侯之尊歟則州公郭公皆其稱公亦不宜獨豫宋也然則謂其封壤之大有加於列國歟則地僅比於魯衛民不亢於齊晉謂其兵爭之少無得罪於諸侯歟則仇衛敵魯抗齊陵邾治滕虐曹干戈之事殆無以異於他國意者其賢君之多能不替其先代立國之意歟則廢居正之義啓爭國之謀基宋之禍者穆也以除害而惡鄭以阻兵而黨衛成穆之亂者殤也扶同惡以成稷之會志黷貨以啓鄭之戰踵殤之覆轍者莊也納朔以抗王人之命黨齊以稔善鄰之仇履殤之危禍者閔也會北杏以倡從齊之謀遇梁丘以固輔齊之好無役不會無盟不從此桓公之所以僅稱賢也襄公圖伯不終其事淺矣成公從伯之善不足以蓋從楚之非昭公去宗室之惡適足以稔堅冰之釁文公因國人以有宋雖與晉三盟而猶不忘從楚之好共公之從列國以盟楚雖與晉四會而猶不能弭其駕宋之鋒平公不能強公室故魚氏始禍自彭城也元公不能制其大夫故華向召亂由南里也景公不能室其私寵故向魋啓釁入于蕭也反覆十三君之行事亦未有可稱而春秋所為拳拳於宋者豈無意乎蓋其故家遺俗流風善政考之春秋未盡亡也然僅有之善旋亦失之何則春秋之季不令之臣專祿周旋何國蔑有而一時諸侯猶曰惟宋事其君也先王之典廢棄不存列國皆是而一時諸侯猶必曰於宋乎觀禮御説之賢稔於諸侯之聞向戌之能卓為諸侯之選孔父之義子哀之清屹然衰世之俗皆有以取貴乎春秋則其人物之著見亦庶幾無忝於前哲之舊謂其風聲氣習泯無可稱固不可也然自司馬不能勝子弟之讒右師不能明君臣之訓人才之賢無復齒舊異時六禮之獻委於荆楚百牢之餼屈於強吳則典禮亦紊寧復故常甚至大心不輸王粟仲幾不受晉功則宋公之故為諸臣者盡忘之矣彼當時之諸侯猶類曰宋湯之後也曰宋周之客也吁宋之為宋文獻之存者能幾何哉雖然春秋之所為拳拳於宋者必有意也嘗即商頌之那而考之蓋自微子至於戴公其間禮樂廢壞亦既久矣聖人刪詩收拾散亡之後而猶必存其頌聲於三百五篇之末果何説邪思昔成王建微子於上公以尹東夏而命之以書一則曰崇德象賢也二則曰率由舊章其崇先代之統重三恪之賔意如此其厚也宋之子孫能修其禮物以率先王之舊則成湯武丁之澤豈遽至於泯然而不繼歟一代文獻之美豈遽至於蕩然而無足觀歟先儒論聖人存商頌之意以為著三統之相承明王澤之相續是則春秋拳拳尊宋之意不然文獻不足夫子常嘆之矣於宋何取乎春秋王霸列國世紀編卷二

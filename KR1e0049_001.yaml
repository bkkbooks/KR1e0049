body:
  text: 春秋王霸列國世紀編卷一宋李琪撰一王世紀周自武王克商建國傳世十二平王東遷為東周始王平王四十九年當隱元年敬王三十九年當哀十四年由平迄敬凡十有四世悼王未即位遇弑止十三世正統二百四十二年為春秋始末按周八百六十有七年前乎春秋者四百年後乎春秋者二百一十五年周政終乎春秋春秋已降末造矣周之不亡者猶二百餘年豈非春秋既作人紀復存之騐隱元平王四九宰咺歸賵三天王崩桓王元尹氏卒武氏子來求賻七凡伯聘戎伐楚九南季聘桓四宰渠伯糾聘五仍叔之子聘蔡衞陳從伐鄭八家父聘祭公來遂逆后于紀九紀季姜歸京師十五家父求車天王崩莊王元莊元單伯逆王姬築王姬館于外榮叔錫桓命王姬歸齊二王姬卒三葬桓王六子突救衞十一王姬歸齊莊王不書崩葬十二僖王元十四單伯會伐宋左謂周大夫公謂魯大夫合依三傳互見單伯會鄄僖王不書崩葬十六惠王元十九五大夫奉子頽伐王立子頽二十王處于櫟二十一鄭伯納王殺頽及五大夫二十三祭叔聘僖五會王世子首止八會王人盟洮天王崩襄王元告據傳惠王實以七年閏月崩襄王難于齊定位而後發喪九公會宰周公葵二十四天王出居鄭大叔以狄伐王王出適鄭處于汜二十五晉侯以師逆王王入于王城二十八朝王所狩河陽朝王所晉執衞侯歸京師二十九會王人盟翟泉三十宰周公聘遂如京師文元叔服會葬毛伯錫命得臣如京師三王子虎卒五榮叔歸含且賵召伯會葬八天王崩頃王元年敖如京師不至而復九毛伯求金得臣如京師葬襄王頃王不書崩葬十四匡王元單伯如齊齊執單伯十五單伯至自齊宣二天王崩定王元三葬匡王九蔑如京師十王季子聘十五王札子殺毛伯召伯十六成周宣榭火成元王師敗績茅戎五天王崩簡王元八召伯賜命十二周公出奔晉十三公如京師會伐秦十五晉執曹伯歸京師十六會尹子伐鄭曹伯歸自京師十七會尹子單子伐鄭會單子伐鄭襄元天王崩靈王元二葬簡王三會單子同盟雞澤十五劉夏逆后于齊二十四豹如京師二十八天王崩景王元三十殺弟佞夫王子瑕奔晉昭十三會劉子平二十三天王崩叔鞅如京師葬景王王室亂劉子單子以王猛居皇劉子單子以王猛入王城王猛卒是為悼王未即位故書名書卒不稱天王不言崩敬王元二十三居狄泉謂東王尹氏立王子朝在王城居西謂西王二十六入成周晉知躒趙鞅納王尹氏召氏毛伯以王子朝奔楚三十二會城成周定元晉執宋仲幾于京師四會劉子召陵侵楚劉卷卒葬劉文公五王人殺子朝于楚六周儋翩率王子朝之徒作亂王處姑蕕七單子劉子逆王慶氏王入王城十四石尚歸脤哀十四敬王三十九敬王四十二年崩元王立在哀公十九年序王世紀曰乾上坤下而天道立君尊臣卑而人極建此義行乎古今之正彞倫之所以叙世敎之所以不冺百王法度之所以相承者也春秋一經緫攝萬事而大本始於尊王聖人蓋謂尊卑不著則人紀不建而天理熄矣尚何萬事之有存哉尊王之義設而後是是非非昭明而不舛此春秋所由作乎春秋之法有述有作小事則述舊而紀錄大事始作以制義尊卑之分君臣之等孰有大於此者皆斷自聖心而始作者也按杜預載晉汲冡得古書科斗文字其紀年編有周襄王會諸侯于河陽之文即春秋天王狩于河陽之書睹此則尊王之辭信為仲尼特筆也是以王加正月首明大訓前未有言天王而法天之號自春秋始前未有稱京師而衆大之名自春秋設嗚呼是聖人定尊卑位君臣復建人紀之本也自平迄敬十有三王王室之事錄乎經者九十有二春秋克已自治之道揣本而不齊其末正始不治其終者也書天王書天子書王者欲其修身有本奉天有道法文王之達于天徳宣王之敕懼天命而無害徳傷治之階矣書王后書王世子書王子者欲其齊家有度傳統有正思關雎之正始下武之繼文而無並后匹嫡之萌矣書京師書王室者欲其朝廷必治國體必立念豐岐之所由興鎬京之所以盛而無下堂厭尊之失矣書居書入者欲天下為家述時邁之訓復東都之會而無以臣召君以君避臣之事矣書來錫命書來歸賵歸含歸脤者欲其謹命令嚴典制紹彤弓之錫功韓奕之賚徳而無屈命僭侯溢寵媵妾之悖矣書來聘書來求金欲其惟禮之守惟正之供修大宰貢賦之式宗伯聘問之節而無辱典征利之瀆矣書朝王書如京師者欲其奔走列國由明堂之位舉酆宮之政而無强侯大邦慢上之患矣書王臣之主盟主會主伐者欲其禮樂征伐悉歸於上如召伯之率職吉甫之治戎而無侯伯陪臣掠權之變矣皆因其不正以反之正而致意於本原者也如此則東周改物而五伯之績可絀矣二霸世紀齊桓公齊桓自莊九年入國未伯以前事繫齊紀左氏莊十五年鄄之㑹曰復會焉齊始伯也然十三年北杏之會列人諸侯而獨爵齊桓先儒以為春秋伯齊之文則齊伯已在北杏當始莊十三年迄僖十七年凡三十有九年為齊桓紀莊十三桓五會北杏北杏之會伯業定矣然齊桓於伯亦勞矣自兹以往事事躬親滅遂會盟柯十四伐宋單伯會伐宋單伯會鄄十五會鄄夫人姜氏如齊伐郳十六伐鄭會同盟幽十七執鄭詹殱于遂鄭詹逃來十九結及盟伐我西鄙二十大災伐戎二十二盟防公如納幣二十三公至自齊公如觀社公至自齊遇于穀會盟扈二十四公如齊逆女公至自齊姜氏入二十六會伐徐二十七會同盟幽會城濮二十八伐衞衞及戰敗績會救鄭臧孫辰告糴三十降鄣遇魯濟伐山戎三十一獻戎㨗三十二城小穀遇梁邱慶父如齊閔元救邢盟落姑仲孫來二遷陽高子來盟僖元次聶北救邢城邢會檉姜氏喪至自齊二城楚盟貫三會陽穀公穀以江黄為遠國非也此亦桓公之所能及爾然公之求諸侯西不問秦北不問晉近周諸國未嘗留意桓公管仲亦識分數矣公子友莅盟四會侵蔡遂伐楚次陘盟召陵只召陵一盟近周自後更不敢雖然假天子以摟諸侯其初甚難但稍稍自尊榮既歸則心已自足矣執陳轅濤塗伐陳會侵陳五會王世子首止盟首止鄭逃歸不盟六會伐鄭圍新城遂救許七伐鄭會盟甯母友如齊八會王人盟洮鄭乞盟九會宰周公葵盟葵十公如齊伐北戎十一姜氏會陽穀十三會鹹友如齊十四城縁陵十五公如齊會盟牡次匡救徐伐厲十六會淮十七伐英氏滅項左謂魯取公穀謂齊伐管仲死桓公取三十年不敢為之事而為之反覆三四十年之前與身死之後其績淺哉姜氏會卞小白卒序齊伯桓紀曰霸之名起於誰乎王道流行侯伯受職古未始有伯也王澤壅而下權張正理微而力政起蒙震主之號而不循敬君之節此伯之名所由立歟以古未始有是而桓實造端則桓為首罪矣而春秋或予桓何哉蓋黜其義而錄其功也功義不相掩而後伯者之是非斷矣何謂義行乎人心之安而主敬以事上純乎由衷之善而履正以律己此桓公之闕也何謂功王室既卑而稍尊四裔已抗而僅戢諸侯羣起而畧定此則桓公之彼善於此也欲知桓公之彼善於此當以春秋世變之迭異考之大抵春秋之世盛衰凡三變桓公未興與桓公之巳伯及桓公之既殁世變各異也然桓公一人之身盛衰又凡三變焉圖伯之初定伯之日及成伯之後得失頗殊也是又桓公僅可錄之中而復有不足焉者也王臣下聘而不荅王師出救而無功凡伯蒙伐戎强于北蔡師書敗荆盛于南鄭分許鄙宋廢鄭嗣紀小而并於齊郕弱而逼於魯此桓公之未興也王禁明而王臣不下聘者六十年盟會同而諸侯無私爭者三十年序績召陵而荆帖矣陳旅聶北而狄退矣獻㨗過魯而戎弭矣此桓公之主伯也天王出居而官守不問衛滅懿親而義師無討楚書子而主會矣狄書人而參盟矣此桓公之既殁也所謂春秋之世盛衰凡三變焉者此也伐郳伐宋侯度不一蔡入侵鄭戎疾未殄滅遂降鄣履事未久施設多舛遇穀盟扈閱理未熟檢防易肆蓋桓公圖伯之初也貫澤而下葵丘以前衣裳不歃血兵車無大戰仲尼稱其一匡孟子與其為盛在是數年蓋桓公定伯之日也九國叛而萌震驚管仲死而放繩墨城杞貶於城邢救徐怠於救許伐黄則外憂起滅項則衆志離會卞則家法墮蓋桓公成伯之後也所謂桓公一人之身盛衰又凡三變者此也驗春秋大勢之三變則桓公主伯為有功即桓公一身之三變則桓公立功為不遠功過相除齊桓之顚末可考矣三霸世紀宋襄公宋襄元年在僖九年蓋葵丘會盟已嘗與也十七年小白卒十八年宋始主諸侯伯雖未成事不可泯迄僖二十三年為宋襄紀僖十八伐齊戰甗齊敗績十九執滕子盟曹南鄫會盟邾用鄫子圍曹二十一盟鹿上會盂執宋公伐宋會盟濮釋宋公二十二伐鄭及楚戰泓敗績二十三齊伐兹父卒序宋伯襄紀曰謂春秋不與宋襄之伯可乎則襄公之始嘗以伯書謂春秋為與宋襄之伯乎則襄公之終不以伯錄始以伯書者曹南之文曰宋公曹人邾人其與北杏城濮主諸侯之辭無異矣終不以伯錄者宋公兹父卒畧不書葬其與秦楚之君無别矣春秋忠厚之法蓋致意乎始而不足乎終者也何以致意乎始宋以先代文獻之後爵居庶邦侯伯之長齊晉猶可以伯豈宋之不可以伯哉能伯矣何以不足乎終齊桓終身之經營獨取於春秋者徒以有靖中國之功襄公非特無功而又階亂則伯將何頼焉或曰襄公假仁義而亡者也曰茍能假仁義則不遽亡也然襄公亦豈知所謂仁義哉伐喪以立威仁悖之甚者也致夷以謀夏義墮之大者也推是物以往雖欲假仁與義不能矣四霸世紀晉文公晉文公自僖二十四年入國何以不書於經公羊子曰文公之享國也短美未見乎天下故為之諱本惡也未伯以前事繫晉紀二十八年伯事著矣迄三十二年凡五年為晉伯文紀僖二十八文五侵曹伐衞入曹執曹伯卑宋及楚戰城濮楚敗績會盟踐土陳如會朝王所衞元咺出奔晉會温天王狩河陽朝王所執衞侯歸京師元咺自晉復歸衞圍許曹伯復歸曹會圍許二十九會王人盟翟泉三十衞侯歸衞圍鄭遂如晉三十一遂如晉三十二重耳卒温至京師無百里翟泉在王城之内乃會諸侯之强大者臨河而盟王其能無至乎翟泉在王城内挾諸侯以抗天子去桓公遠矣序晉伯文紀曰晉有二文之業謂文侯文公也書錄文侯之命扞王于艱錫以秬鬯為東周賢侯春秋詳文公之家文公之興其事易於齊桓固有自來矣文公以前晉之君大夫曾不通於盟會不著於簡冊文公既入國而事之不載於經者亦凡四年雖以納王之懿功削而不見至二十八年一簡之内乃六挈晉侯不以為繁是果何哉蓋晉自武公以枝代宗非有王命并吞專立讀無衣之詩雖晉之臣民不能自安春秋於是黜晉不書文公奔而復國内何所承上何所禀經復畧之勤王固為大美原其初心狐偃曰求諸侯莫如勤王是特求諸侯之利心而為之豈眞知有君臣之義沒其行事蓋求名而不得者也至二十八年晉楚之爭乃關夷夏之盛衰非係一國之得失春秋抑楚之深故子晉之亟則晉亦不為無績於中國矣此其桓文並稱歟大抵桓文雖並稱而文固非桓匹也桓公二十餘年蓄威飬晦始能向楚文公一駕而城濮之功多於召陵桓公屢盟數會遲回晩歲始會宰周公文公再合而溫之事敏乎葵丘桓公終身與諸侯周旋會鄄失魯盟幽失衞首止失鄭葵丘失陳文公三㑹則大侯小伯莫有不至其得諸侯又盛乎桓公而曰文非桓匹何也文公之功多乎桓公者罪亦多乎桓公者也事速乎桓公者義先壞乎桓公者也名盛乎桓公者實衰乎桓公者也春秋不以功蓋罪不以事掩義不以名誣實非其非桓匹歟桓公得江黄而不用於伐楚文公則謂非致秦則不可與楚爭楚抑而秦興矣此桓公之不肯為也桓公會則不邇三川盟則不加王人文會畿内則抗矣盟子虎則悖矣此桓公之所不敢為也桓公寧不得鄭不納子華懼其奬臣抑君不可以訓文為元咺執衞侯則三綱五常於是廢矣此又桓公之所不忍為也觀此則夫子正譎之辨獨不深切著明哉五霸世紀晉襄公晉自襄公繼文世主夏盟是時秦穆亦號伯西戎春秋列秦於荒服曾不得與邾莒之侯以爵先後況肯授之伯哉襄公起僖三十三年迄文六年凡七年為晉伯襄紀僖三十三襄元敗秦殽殽之戰晉文既没齊秦皆有爭伯之心襄公此舉足以繼伯雖然亦欲速耳天保采薇之意治内治外固有序也葬文公敗狄箕伐許文元伐衞衞伐會戚二戰彭衙秦敗績及處父盟會盟垂隴伐秦三會伐沈秦伐公如晉及晉侯盟處父伐楚救江四公至自晉伐秦五敖如晉六行父如晉驩卒當秦穆之伯晉襄繼文不肯遽捨其業區區爭衡於泗上數年之間連兵不已豈得已哉一至後世强暴代起其志則在一隅而無意於南方是以范山曰晉君志不在諸侯北方可圖故楚得乘閒以主中國序晉伯襄紀曰齊孝公不能率桓公之烈晉襄公能繼文之統孝公之初宋有抑齊之志襄公之始秦懷駕晉之謀宋啓甗之爭秦尋殽之釁皆爭伯之端也孝公不能抗宋而襄公首能挫秦此晉之所以未失伯則殽之功當大書之與城濮等可也秦誓曰晉襄公帥師敗諸殽而春秋不書君將獨言晉人是特削文也夫殽之戰春秋亦幸晉有功矣乃削之何邪曰幸之者夷不偪華以權之未失也削之者遽興姜戎以義之不可也豈得以小功妨大義乎雖然襄公復伯則實由乎此文公方沒三强並興秦雄西陲狄狃北師楚張於南茍縱敵則晉伯去矣襄公夏戰殽以卻秦秋敗箕以剪狄冬伐許以離楚一年之間三敵悉退亦可謂有伯者之畧此其能繼文者也茍有伯者之畧則襄之烈何為僅止此乎曰外患既息舉動悉異伐衛則損威矣會公孫則毁列矣士縠主盟則權散矣陽處父救江則謀怠矣越一二載事不逮初況能持久哉是以君子不貴速成而圖全於其終不志小利則宅慮於其遠襄之規模又淺於文甚矣六霸世紀晉靈成景厲晉伯在靈成景厲之世其權卑於列國矣楚莊乘晉之衰進乎方伯矣春秋書伯在晉不在楚故曰夷狄之有君不如諸夏之亡也靈起文六年盡宣二年成繼靈盡宣九年景繼成盡成十年厲繼景盡成十八年凡四十九年為晉伯靈成景厲紀文六靈元遂如晉葬襄公殺陽處父狐射姑出奔狄七及秦戰令狐先蔑奔秦會盟扈八會盟衡雍九殺先都殺士縠及箕鄭父靈公今日殺大夫明日殺大夫誅戮奔放無時無之此見其不君而卒不免會救鄭十秦伐十一會承筐十二戰河曲十三公如晉公及晉盟公還自晉十四公至自晉會同盟新城納㨗菑于邾弗克納十五行父如晉伐蔡入蔡行父如晉盟扈十七伐宋會扈宣元放胥甲父于衞古者大夫有罪或諫不行出待于竟三年君示之環則還示之玦則往胥甲父未見其罪晉遽放之非禮也放無罪也故稱國與稱國以殺義同趙盾救陳會棐林伐鄭趙穿侵崇伐鄭二秦伐侵鄭趙盾弑君夷臯三成元六侵陳七會黒壤八伐秦九會扈荀林父伐陳黑臀卒于扈郤缺救鄭十景元伐鄭十一會狄攅函十二及楚戰邲敗績同盟清十三殺先縠十四伐鄭十五滅潞以嬰兒歸秦伐十六滅甲氏及留吁伯宗勸晉不伐楚而伐狄不治腹心之疾而治疥癬吾未聞以千里畏人者使畏强禦貪小利者之說亦不足責吾獨惜伯宗之有是言也十七會同盟斷道十八伐齊歸父如晉歸父還自晉至笙奔齊成元盟赤棘會齊戰鞌齊敗績盟爰婁三會伐鄭公如晉公至自晉伐廧咎如荀罃聘及荀罃盟四公如晉公至自晉五會穀會同盟蟲牢六嬰齊如晉行父如晉欒書救鄭七會救鄭同盟馬陵林父出奔晉八韓穿言汶陽田歸齊欒書侵蔡殺趙同趙括士燮聘會伐郯九會同盟蒲來媵執鄭伯欒書伐鄭秦白狄伐十會伐鄭獳卒公如晉十一厲元公至自晉郤犫聘及郤犫盟行父如晉十二周公出奔晉會瑣澤敗狄交剛據左氏觀成景以後大抵只理會大行山下諸狄但欲些比近經營些土地以益吾國而無意於南方楚人因得以乘隙而横行於中國故楚益强而晉之伯遂衰十三郤錡來乞師會伐秦十四林父自晉歸衞十五會同盟戚執曹伯歸京師華元出奔晉華元自晉歸宋會會吳鍾離十六欒黶來乞師及戰鄢陵楚鄭敗績會沙隨不見公會尹子伐鄭曹伯歸自京師執行父舍苕行父盟扈十七會尹子單子伐鄭同盟柯陵荀罃來乞師會單子伐鄭殺郤錡郤犫郤至十八殺胥童晉弑君州蒲序晉伯靈成景厲紀曰靈公政墮柄分無抗伯業之志成公力弱事淺無主諸侯之權景公心勞謀舛無制中夏之畧厲公外强中乾無服人心之道四公雖執夏盟非復文襄之舊矣靈公以少主縱强卿上驕下肆楚始爭鄭蓋將嘗試晉政於是有狼淵之師此非細故也而救鄭之役止書晉人衞鄭欲介魯以求通蓋未忘晉徳於是為沓棐之會此關大勢也而新城之盟晉侯不出扈之盟曰討齊亂扈之會曰平宋難蓋君臣之大倫人道之不可廢此豈常變也哉或求賂以免或無功而還楚范山曰晉君少不在諸侯北方可圖也夷狄謀取其伯方且沈溺晏安厚斂以彫牆輕殺而愎諫雖欲不亡得乎故曰無抗伯之志也成公若有志矣内難甫靖履國未長四年而後始出偏師以侵陳黑壤與扈二會僅能合列國而已黑壤以服鄭扈以謀陳亦庶幾改物也然始之不能有為者凡數年外而楚人三歲三伐鄭晉無擯郤之師内而鄭家弑穆公晉無討亂之刑諸侯何所觀焉故曰無主諸侯之權也景公若能収其權矣䂓模失序徒勤諸侯不能首合與國大修同盟以治即異之黨使楚人得號令乎辰陵而乃亟會攢函求山後諸狄是孰緩孰急也不能謀少西氏之逆誅陳之惡使楚遂行方伯之事乃且修帷房一笑之憾興大師以伐齊得已不已是孰重孰輕也不能統一六師蒐繕卒乗以一矢遺楚而使邲不復從為中國羞乃且伐咎如滅赤狄哆然言功是孰害孰利也蟲牢馬陵于蒲晩年三會雖得諸侯竟莫駕楚故曰無制中夏之畧也厲公若有其畧矣徳薄而多大功慮淺而數得志觀厲公不特純以汰心行之亦假義飾譽者也歸于京師而後正曹負芻之罪請於王官而後加伐鄭之威比類可欺世自揜矣晉之忌者曰秦曰楚曰吳曰狄厲公自交剛敗狄則狄服會京師伐秦則秦懼戰鄢陵勝楚則楚弱會鍾離通吳則吳成四鄰無釁而諸侯反貳是以沙隨辱魯猶未快也而求多季孫柯陵伐鄭猶未息也而再勤單子諸侯無患而蕭牆反危是以三郤之誅成而匠麗之難萌矣故曰無服人之道也七伯世紀晉悼公悼公起四公之衰而復二伯之盛蓋晉賢侯也諡不得如成景平昭之美而以悼終乎禰廟何哉悼生十四年矣而立其入國之明日逐不臣者七人即位之一月取六官於民譽可謂幼而明且斷矣不十年而駕楚又五年而沒曾不逮中年也其臣深惜而加以此名歟起成十八年迄襄十五年凡十有六年為晉悼伯紀成十八悼元公如晉公至自晉士匄聘士魴乞師會同盟虚朾襄元會圍宋彭城韓厥伐鄭荀罃聘二侵鄭會戚會戚遂城虎牢三公如晉盟長樗公至自晉會單子同盟雞澤陳袁僑如會及陳袁僑盟荀罃伐許四豹如晉公如晉五公至自晉豹鄫巫如晉會吳善道善道之會晉悼公通吳以圖楚一向只留意於外而國内事更不留意盟一放於大夫而三晉之萌見矣大夫為政欲為而不可得誠得悼公之把握在此會一放焉何所不至會吳戚戍陳會救陳六宿如晉七會鄬鄭髠頑如會未見卒陳逃八公如晉會邢丘公至自晉士匄聘九宿如晉會伐鄭同盟戲十會會吳柤遂滅偪陽伐秦會伐鄭戍鄭虎牢十一會伐鄭同盟亳城北會伐鄭會蕭魚秦伐十二士魴聘公如晉十三公至自晉十四會會吳向會伐秦中行偃悼公即位十餘年規模指畫思深識遠伯業僅成於蕭魚之會而伐秦之役得臣閒驕心遽生次涇而不濟人心之不可泯如此會戚十五周卒序晉伯悼紀曰晉悼公其猶有君子之資乎不獨伯功之美齊桓歴變履險以數十年之經營而行事未免過舉晉文免於奔走晩而復國然血氣之虚驕未除悼公之齒淺矣更事變未多閱義理未熟也乃能忠信而不迫堅忍而持重有回慮郤顧之謀無輕逞輒快之舉蓋亦稍知以道養其心者歟八年九合諸侯則勤於安夏也三分四軍則謹於用民也不登叛人則識名義也稟命王官則知所尊也屈己和戎則不貪功外域也朝聘有數則不求多列國也六卿選徳則用人有章也騶御知訓則敎士有法也此其所以能服諸侯得鄭而駕楚哉使晉以智力相長設詐術任强力未必能服諸侯也悼公先以謙徳臨之雞澤之召諸侯曰寡君願與一二兄弟相見以謀不協此豈有勢要力劫之為哉故十三國相與周旋不令而從無滅譚滅遂執曹執衞之事使晉以盟誓為信瀆鬼神費辭令未必能得鄭也悼公純以誠心行之鄭子展曰晉君方明必不棄鄭此豈晉以區區之載書留之故五會之信終於不盟無逃盟失盟之事使晉以戰伐為威暴骨而逞未必能駕楚也悼公以一容量處之楚子囊曰晉不可敵事之而後可此豈晉能以力競而勝之哉故三駕之烈不交一旅無城濮鄢陵之勞是三者悼公之所謂猶有君子之資者乎然悼公之盛如此而其失安在曰能服諸侯而不能杜大夫之漸能得鄭而不能掩失陳之責能駕楚而不能蓋通吳之非夫諸侯盟會之權非大夫敢干也蕭魚以後凡三大會士匄荀偃實儼然主之諸侯雖合大夫浸分何謹於諸侯而縱於大夫乎陳不可棄猶鄭之不可舍也戍陳之役以為有陳非吾事無之而後可鄭雖向晉陳卒歸楚何工於撫鄭而拙於懷陳乎吳不可啓猶楚之不可釋也會向之後欲數吳不徳以退吳人抑已晩矣楚患雖弭吳憂猶甚何明於治楚而闇於治吳乎不然則悼公之伯遠過桓文矣八伯世紀晉平昭晉至平昭伯事陵遲墮廢春秋所書皆錄變之文也平起襄十六年盡昭十年昭繼平盡昭十六年凡三十二年為晉伯平昭紀襄十六平元葬悼公會湨梁大夫盟執莒子邾子以歸會伐許豹如晉十八執衞石買會同圍齊曹伯負芻卒于師十九盟祝柯執邾子取邾田宿如晉士匄侵齊聞齊侯卒還會柯二十會盟向會盟澶淵二十一公如晉公至自晉欒盈出奔楚會商任二十二會沙隨二十三盈復入晉入曲沃齊伐叔孫豹救次雍榆殺盈二十四豹如晉會夷儀二十五會夷儀同盟重丘二十六荀吳聘會澶淵執衞甯喜二十七會宋大夫盟宋二十八衞石惡出奔羯如晉二十九會城杞士鞅聘羯如晉三十王子瑕奔會澶淵宋災故昭元會晉楚虢秦伯弟鍼出奔荀吳敗狄大鹵楚比出奔二韓起聘叔弓如晉公如晉至河乃復宿如晉五公如晉公至自晉六宿如晉八叔弓如晉十彪卒昭元婼如晉葬平公十一會厥憖十二公如晉至河乃復伐鮮虞十三楚比自晉歸楚弑君虔會劉子平同盟平公不與盟執意如以歸公如晉至河乃復十四意如至自晉十五荀吳伐鮮虞公如晉十六公至自晉夷卒序晉伯平昭紀曰悼公能以晉國壊亂之後復文襄已失之業平公不能以中夏安强之時保悼公方成之功人之强於為善與夫安於不競者其興衰相遠固如是也孟子曰晉平公之於亥唐也弗與共天位也弗與治天職也夫平公衰微正患不能自為政大夫用事耳豈有職位弗與共治者乎蓋政在侈家而賢者壅棄此其所以削弱不亢也平公五盟六會服齊狄寧東夏平秦亂城淳于師徒不頓民無謗讟晉祁午數當時之功如此然内有變而不知外有患而不悟尚何有功之足云哉方桓文之初每患伯權大强而王政復弱文襄以後王政不必論矣惟恐伯權之不能强也權者大物也上不能制而授之於下則下强而上弱中國不能制而授之於外域則外域强而中國弱家有千金之利已弗能愛呼庸𨽻而分之雖三尺之童弗為豈有尊為邦君授權於大夫此溴梁之會平公所謂内有變而不知者也人欲自毁藩籬揖仇敵於廡下而與盾柄此不待知者而知其不可豈有身主夏盟授權於夷狄此宋之盟平公所謂外有患而不悟者也蓋身茍有道自便者媮於及身之謀而忘乎後日之害平公則謀出乎身而害見乎身何其繆歟湨梁之事非大夫敢竊權也諸侯在會而大夫實主載書是委權以與之也中行偃一怒而十二國興戎後五年欒盈之變作曲沃之民惟主欒氏民不知有公室晉幾分國而並立矣宋之盟非夷狄敢畧權也晉主夏盟而挈諸侯以畀楚是棄權以假之也虢之會再讀舊書後八年楚靈王會于申實用齊桓召陵之典晉蓋十九年無與中國之事矣此皆平公身致之者也至於昭公之政則又微矣僅能一會大夫一盟諸侯方楚虔卒于乾谿諸侯庶幾復伯為晉君臣者改物厲志憤悱驚懼以率舊烈猶恐不逮今也四方未覩徳而虒祁崇侈以啓戎列國未聞信而邾南盛兵以示汰平丘雖曰同盟齊敢拒令鄭敢爭承衞病蒭蕘之擾魯困蠻夷之訴坐視諸侯之去而不之顧況能駕敵國哉宜乎晉之卑也九伯世紀晉頃定頃定之世晉伯愈降愈壞蓋不復方伯之職旄之詩可賦矣然終乎黄池晉人猶以伯視晉則知晉雖不能伯而春秋猶未絶晉也頃起昭十六年定繼頃迄乎獲麟凡四十六年為晉伯頃定紀昭十六頃元意如如晉葬昭公十七荀吳滅陸渾戎二十一士鞅聘公如晉至河乃復二十三婼如晉執婼圍郊公如晉至河有疾乃復二十四婼至自晉二十五會黄父二十七會扈二十八公如晉次乾侯二十九公如晉次乾侯三十去疾卒定元葬頃公三十一會適厯荀躒唁公乾侯三十二會城成周定元執仲幾于京師三公如晉至河乃復四會劉子召陵侵楚盟臯鼬晉定欲舉桓文之事於諸侯渙散之時志則勤矣其不知勢乎杞伯成卒于會伐鮮虞五士鞅圍鮮虞六斯何忌如晉執宋樂祁犂八會瓦士鞅侵鄭遂侵衞十趙鞅圍衞十三趙鞅入晉陽以叛荀寅士吉射入朝歌以叛趙鞅歸晉哀元齊衞伐二趙鞅納衞蒯聵于戚戰鐵鄭敗績四執戎蠻子赤歸楚五趙鞅伐衞六趙鞅伐鮮虞七魏曼多侵衞十趙鞅侵齊十三會吳黄池魏曼多侵衞十四定十六序晉伯頃定紀曰讀隱桓春秋而知王澤之竭也讀定哀春秋而知伯烈之壊也晉伯復盛於悼公浸衰於平昭而遂廢於頃定夫晉以弈世九君之業豈無積累之功著在諸夏至頃定一壞而不可復収嗚呼廢興存亡未有無故而然者也千尋之木物能蠧之必其中先腐壞戕蝕而後蠧生焉嘗原晉事之顚末而察其所由失矣或曰晉之廢也其變在夷狄有楚弗攘有吳弗抑二强並立伯權遂弱自召陵擁十八國之衆不能振旅至於戎蠻之執晉俛焉北面而事楚以京師之禮自吳滅巢滅徐伐陳伐齊晉不能誰何迄于黄池之會吳哆然操方伯之令而下以列國命晉春秋由此絶筆焉則晉之失伯實呉楚之張也曰中國茍合則呉楚豈能閒乎其端在諸侯之先貳也當時以齊景衛靈宋景之君其國皆强戮力周旋何畏於吳楚今也齊景有抑晉代興之志衞宋魯之君無共攘臂以從齊者也蓋執行人叔孫婼與邾大夫坐而失魯執宋仲幾宋樂祁犂而失宋涉佗成何詬衞而失衞荀寅辭蔡而失蔡假羽旄於鄭而失鄭是以齊得以盡取諸侯鄭則與齊盟于鹹會于安甫矣衞則與齊盟于沙次于五氏矣魯則與齊會于牽矣宋則與齊會于洮矣終于衞侯齊侯且伐晉矣則晉之失伯乃諸侯之離也曰晉國茍治則諸侯安得背乎其原在大夫之先叛使六卿諸臣如先大夫之肅皆盡忠以輔公室何憂乎齊衞今也强家多門各求封殖而削弱之禍獨歸宗國蓋自趙鞅取衛賁五百家動晉陽之甲自韓不信執宋命卿不顧踐土之盟自魏舒南面莅政敢干位以令大事而趙籍韓虔魏斯為諸侯之萌已成矣則晉之失伯乃大夫之擅也曰晉之禮義素明則大夫豈得擅乎利勝而義微此上下之所以不奪不饜也范鞅請冠而魯使蒙執趙鞅受楊楯而宋卿賈禍邯鄲爭貢而三卿亂國或取季孫之賂而昭公不納或求蔡侯之貨而晉師無出或索魯十牢而吳人藉為口實孟子曰上下交征利而國危矣晉伯之壞尚誰咎歟此春秋所以謹義利之辨察天理人欲之分正君臣上下之位而示後世以防微杜漸反本澄源之道者也十列國本同姓世紀魯魯周公之後也伯禽始封曲阜是為魯公伯禽之後曰煬曰獻迄于孝公惠公閱世十二為隱公自隱至哀又閱十二為春秋終始降乎哀公歴九世至頃公魯為楚所并及漢興楚亡魯猶號稱禮義守節之邦周公伯禽之澤可謂遠矣隱元及邾儀父盟蔑公羊以會猶最則善惡何為哉輕重之可也以及為汲汲則浮來之盟豈汲汲哉於莒欲之可也穀梁以會者外為主則趡之會豈邾之能主魯會哉志之可也以暨為内及外則會公于棐沓曷為不志天王使宰咺歸賵君子行禮有過於厚無過於薄歸仲子之賵何以為非禮及宋盟宿祭伯來有不可朝而不與朝祭伯來是也有不敢朝而不與朝介葛盧來是也益師卒二會戎潛無駭入極及戎盟唐紀裂繻逆女伯姬歸紀子氏薨三君氏卒武氏子求賻四及宋遇清翬會四國伐鄭五矢魚棠考仲子宮獻六羽宗廟有常不書考宮立宮有書譏變常也妾母有廟自仲子始婦人有諡自文姜始彄卒六鄭渝平會齊盟艾七叔姬歸紀城中齊弟年聘伐邾天王使凡伯聘八鄭宛歸祊入祊及莒盟浮來螟無駭卒九天王使南季聘大雨震電大雨雪挾卒城郎會齊防十會齊鄭中丘翬會齊鄭伐宋敗宋菅取郜取防十一滕薛朝旅見也非天子不旅見切意舊無此禮所以有爭長之事長滕侯非禮也而薛侯不爭後鄭禮也而公子忽怒然則禮廢久矣時人無能知者會鄭時來及齊鄭入許薨桓元即位會鄭垂鄭璧假許田及鄭盟越大水二滕朝會三國稷成宋亂取郜鼎納太廟杞朝入杞及戎盟唐至自唐三會齊嬴會杞郕翬如齊逆女齊送姜氏會齊讙姜氏至自齊齊弟年聘有年四狩郎天王使宰渠伯糾聘五天王使仍叔子聘城祝大雩螽六實來會紀成大閱子同生其不曰世子禮也郊特牲曰天子之元子士也天下無生而貴者也周禮典命諸侯適子誓於天子攝其君則下其君之禮一等未誓則以布帛繼子男紀朝七焚咸丘穀鄧朝八烝天王使家父聘烝伐邾雨雪祭公來九曹使世子射姑朝十會衞桃弗遇齊衞鄭來戰郎十一柔會三國盟折會宋大夫鍾會宋闞十二會把莒盟曲池會宋燕盟穀丘會宋虛會鄭盟武父及鄭伐宋戰宋十三會紀鄭及四國戰四國敗績大水十四會鄭曹無冰鄭弟語來盟御廩災御廩供京師之廩書災魯不供也何以知其為供天子之廩以哀三年御書推之蓋御書進於君者也周既有御書則廩名御者必非諸侯之私有嘗十五天王使家父求車周禮采服貢服此王制也春秋諸侯不供上之人又從而求之不供者其罪已不可逃而求之者又何不自重也雖然此猶有求也文公以後無有求者矣會齊艾邾牟葛朝會三國袲伐鄭會三國曹至自伐鄭城向十七會齊紀盟黄會邾盟趡及齊戰奚及宋衞伐邾十八會齊濼與姜氏如齊薨于齊喪至葬莊元夫人孫齊築王姬館外王使榮叔錫桓命二慶父伐於餘丘姜氏會齊禚三溺會齊伐衞次滑四姜氏享齊祝紀伯姬卒齊葬及齊狩禚五姜氏如齊師郳黎來朝會四國伐衞六至伐衞螟齊歸衞俘七姜氏會齊防恒星不見星隕如雨大水無麥苗姜氏會齊穀八師次郎俟陳蔡治兵及齊圍郕郕降齊師還九及齊大夫盟蔇伐齊納子糾及齊戰乾時敗績浚洙十敗齊長勺侵宋敗宋乘丘十一敗宋鄑紀叔姬歸酅十三齊桓始伯會齊盟柯十四單伯會伐宋單伯會五國鄄單伯左謂周大夫公穀謂魯大夫今依三傳互見十五姜氏如齊十六會八國同盟幽十七鄭詹自齊逃來多麋十八追戎濟西有􅈮十九結媵陳婦鄄遂及齊宋盟姜氏如莒齊宋陳伐西鄙二十姜氏如莒二十一姜氏薨二十二肆大眚眚災肆赦乃罪之當宥者非但曲赦而已二百四十二年獨書此以見非制蓋莊公率意創行以茍悅人情也葬文姜及晉高傒盟防如齊納幣二十三至自齊祭叔聘如齊觀社至自齊荆聘及齊遇榖蕭叔朝丹楹會齊扈二十四刻其桷如齊逆女至自齊姜氏入大夫宗婦覿幣大水二十五陳女叔來聘日食鼓用牲社伯姬歸杞大水鼓用牲社門夏書曰瞽奏鼓嗇夫馳周官鼔人救日月則詔王親鼔則鼔當在朝也天子在朝則諸侯同矣嗇夫牧闥之官馳則急於取牲以用之若此則鼔在朝而又用牲于社禮也莊公鼔于社非禮也故譏之友如陳二十六伐戎至自伐戎會宋齊伐徐二十七會杞伯姬洮會四國同盟幽友如齊葬原仲杞伯姬來莒慶逆叔姬杞朝會齊城濮二十八會齊宋救鄭築郿言築者創新邑也臺囿之類是也魯二十四邑書築者五如城中丘之類城舊邑也大無麥禾辰告糴齊二十九新延廏有蜚紀叔姬卒城諸及防三十成葬紀叔姬日食鼓用牲社及齊遇魯濟三十一築臺郎築臺薛齊獻戎㨗築臺秦不雨三十二城小穀牙卒薨路寢般卒慶父如齊閔元葬莊公及齊盟落姑季子來歸齊仲孫來二吉禘莊公薨姜氏孫邾慶父出奔莒齊高子來盟僖元姜氏薨夷齊以歸會五國檉敗邾偃友敗莒酈獲莒拏夫人氏喪至自齊二城楚丘葬哀姜不雨三不雨不雨雨友如齊莅盟會七國侵蔡伐楚及江黄伐陳至自伐楚兹會六國侵陳五杞伯姬朝其子兹如牟及七國會王世子首止盟首止六會五國伐鄭圍新城救許至自伐鄭七小邾朝會四國盟寗母友如齊八會王人六國盟洮禘大廟用致夫人九會宰周公六國葵伯姬卒盟葵丘十如齊大雨雪十一及姜氏會齊陽穀大雩旱暵則舞雩則雩者旱祭也龍見而雩則雩者時祭也旱閔雨也時祭禱也公羊以言雩則旱見言旱則雩不見非矣十三會七國鹹大雩友如齊十四城縁陵季姬及鄫遇防使鄫朝十五如齊會七國盟牡丘次匡敖及大夫救徐螽至自會季姬歸鄫震夷伯廟十六季友卒鄫季姬卒兹卒會八國淮十七滅項姜氏會侯卞至自會十八救齊十九會四國盟齊二十新作南門郜朝西宫災二十一大旱伐邾楚冝申獻㨗會盟薄釋宋公二十二伐邾取須句及邾戰升陘二十五宋蕩伯姬逆婦會莒衞盟洮二十六會莒衞盟向齊侵西鄙追酅弗及齊伐北鄙遂如楚乞師以楚伐齊取穀至自伐齊二十七杞朝遂入杞會諸侯盟宋二十八買戍衞不卒刺之晉文始伯會七國盟踐土朝王所杞伯姬來遂如齊會九國溫朝王所圍許二十九介葛盧來至自圍許會王人六國盟翟泉大雨雹介葛盧來三十天王使宰周公聘遂如京師遂如晉三十一取濟西田遂如晉四卜郊不從乃免牲猶三望杞伯姬求婦三十三齊國歸父聘晉襄伯伐邾取訾婁遂伐邾如齊至自齊薨小寢隕霜不殺草李梅實文元即位天王使叔服會葬葬僖公天王使毛伯錫命得臣如京師敖會晉戚敖如齊二作僖公主及晉處父盟敖會四國盟垂隴自十二月不雨至七月大事大廟躋僖公遂如齊納幣三得臣會五國伐沈如晉及晉盟四至自晉逆婦姜于齊衞寗俞聘風氏薨五王使榮叔歸含且賵葬成風王使召伯會葬敖如晉六行父如陳晉靈伯行父如晉遂如晉葬晉襄閏月不告朔猶朝廟七伐邾取須句遂城郚狄侵西鄙會諸侯晉大夫盟扈敖如莒莅盟八遂會晉趙盾盟衡雍遂會雒戎盟秦敖如京師不至復奔莒
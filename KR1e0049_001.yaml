薨楚宮子野卒羯卒滕會葬葬襄公臣子之施於君父者不可施於同列杜預謂隱元年諸侯會葬非禮也昭元即位豹會晉楚十國虢取鄆叔弓疆鄆田二晉韓起聘叔弓如晉如晉至河乃復宿如晉三叔弓如滕小邾朝大雩大雨雹四大雨雹取鄫豹卒五舎中軍魯因先代舊嘗用八佾隱公降而用六書曰初獻六羽文之躋僖公以父先祖定公反之書曰從祀先公皆善之也三軍之作以僭見譏今能舎其一故穀梁以為復正得其㫖也如晉莒牟夷以牟婁防兹奔至自晉叔弓敗莒蚡泉六宿如晉大雩叔弓如楚七暨齊平如楚婼如齊莅盟至自楚宿卒八叔弓如晉蒐紅大雩九叔弓會楚于陳貜如齊築郎囿十齊欒施來奔意如叔弓貜伐莒婼如晉葬晉平十一叔弓如宋歸氏薨大蒐比蒲貜會邾祲祥意如會七國厥憖葬齊歸十二宋華定聘如晉至河乃復憖出奔齊十三叔弓圍費會劉子十二國平同盟平不與盟晉執意如以歸至自會如晉至河乃復十四意如至自晉十五有事武宮籥入叔弓卒去樂卒事如晉十六至自晉大雩晉頃伯意如如晉葬晉昭十七小邾朝郯朝星孛大辰十九地震二十一晉士鞅聘叔輒卒如晉至河乃復二十二大蒐昌間叔鞅如京師葬景王二十三婼如晉叔鞅卒晉執婼晉圍郊莒庚輿來奔地震如晉至河有疾乃復二十四貜卒婼至自晉大雩二十五婼如宋叔詣會九國黄父鸜鵒來巢上辛大雩季辛又雩孫齊次陽州晉唁野井婼卒齊取鄆二十六至自齊居鄆圍成會四國盟鄟陵至自會居鄆二十七如齊至自齊居鄆邾快來奔如齊至自齊居鄆二十八如晉次乾侯二十九至自乾侯居鄆齊高張唁公如晉次乾侯叔詣卒鄆潰三十在乾侯三十一在乾侯意如會晉荀躒適厯晉荀躒唁公乾侯黑肱以濫來奔三十二在乾侯取闞何忌會十國城成周薨乾侯定元春王天子常於歳首令太史頒朔于諸侯諸侯受而藏之祖廟今昭公薨于外嗣子未以喪歸天子雖頒朔孰從而受之故不書正月以明國無君則臣子不可代受朔也喪至自乾侯即位葬昭公大雩立煬宮隕霜殺菽二雉門及兩觀災新作雉門及兩觀三如晉至河乃復何忌及邾盟拔四會劉子十八國召陵侵楚及諸侯盟臯鼬至自會五歸粟蔡意如卒不敢卒六侵鄭斯何忌如晉城中城斯何忌圍鄆七大雩齊國夏伐西鄙大雩八侵齊至自侵齊侵齊至自侵齊齊國夏伐西鄙會晉瓦至自瓦斯何忌侵衞從祀先公盗竊寶玉大弓九得寶玉大弓十及齊平會齊夾谷至自夾谷齊來歸鄆讙龜陰田我實失之而齊歸之曰歸如齊人歸我濟西田是也因魯田而以他國之田書故曰來歸見齊之侵魯也州仇何忌圍郈州仇何忌圍郈州仇如齊十一及鄭平叔還如鄭莅盟十二州仇墮郈斯何忌墮費大雩會齊黄至自黄圍成至自圍成十三築虵淵囿大蒐比蒲十四衞公孫戌來奔衞北宮結來奔會齊衞牽至自會天王使石尚歸脤宋弟辰自蕭來奔大蒐比蒲邾來會城莒父及霄十五邾朝鼷䑕食郊牛改卜牛郊薨高寢邾來奔喪姒氏卒滕來會葬葬定公雨不克葬戊午日下昃乃克葬葬定姒城漆哀元即位鼷鼠食郊牛改卜牛郊何忌伐邾斯州仇何忌伐邾取漷東沂西田州仇何忌及邾盟句繹滕朝三地震桓僖宮災斯州仇城啓陽季孫斯卒州仇何忌圍邾四城西郛亳社災五城毗叔還如齊六城邾瑕齊國夏及高張來奔叔還會吳柤何忌伐邾七會吳鄫伐邾入邾以邾益來八吳伐齊取讙及闡歸邾益齊歸讙及闡十邾益來奔會吳伐齊至自伐齊十一會吳伐齊戰艾陵齊敗績十二用田賦孟子卒會吳橐臯會衞宋鄖螽十三會晉吳黄池至自會螽星孛東方螽十四西狩獲麟哀公終二十七年如越復歸卒于有山氏悼公立序魯世紀曰春秋主魯而述作者也故錄魯之行事特加内魯之文列國稱侯而魯獨稱公列國書卒而魯獨稱薨列國之君至魯則曰朝大夫至魯則曰聘而魯之君大夫有事于列國則曰如經書公如齊如晉大夫如陳如宋是也列國之盟于魯則曰來盟而魯之有盟于列國則曰莅盟經書公子友莅盟公孫婼莅盟是也列國之擅相吞滅者書曰滅而魯則不書滅而書取經書取鄫取邿是也列國之専殺大夫皆書曰殺而魯則不書殺而書刺經書公子買不卒戍刺之刺公子偃是也列國之君去國則書出奔而魯則不書奔而書孫經書公孫于齊是也春秋可謂尊魯之至者也仲尼刪詩則史克之頌不頒之邶鄘衞齊鄭之風而係於清廟之後其定書則費誓之文獨附之盤訓誥命之末蓋不獨於春秋之尊魯也嗚呼春秋乃為是尊魯之至者將望之深而責魯以備也是故襃貶大法皆自魯始而是非善惡未嘗没其實焉不書即位不書王不書正所以責備乎魯君也書夫人姜氏書婦姜書孟子所以責備乎夫人也書翬書柔書溺書仲遂所以責備乎卿大夫也曰郊曰禘曰大雩曰大閱曰大蒐所以正魯之僭典也曰考宮曰獻羽曰立宮曰毁泉臺所以正魯之禮制也曰初稅畝曰作丘甲曰用田賦所以正魯之失政也曰作三軍曰舎中軍所以正魯之紊權也曰築郿曰新延廐曰新作南門所以正魯之厲民也曰大水曰螟曰螽曰震電曰雨雹所以正魯之慢時也春秋責魯之備蓋如此哉通一經之所書大而關乎王室之隆替係乎伯政之善否交乎列國之往來凡因魯以立文者其示義固不專在魯矣至為魯而特筆者常事則不錄所以修泮宮復閟宮克淮夷詩之所以頌春秋闕焉而所錄者皆事之變也攷夫事之所由變而十二公之得失蓋可觀矣亟於伐邾而捨盟蔑之信貪於得祊而忘許田之失始黨宋衞以仇鄭而終挾齊鄭以惡宋入極之師既縱於無駭而伐鄭伐宋之師復擅於公子翬此隱公之所以有鍾巫之變也捨許田以遂鄭黨納郜鼎以成宋亂强則屈已於齊鄭宋衞之國弱則肆志於滕把曹邾之君始逆兄弟之倫而天理墮終瀆夫婦之分而人欲縱此桓公所以取彭生之禍也會戚廢復讎之義納衞有奬叛之謀圍郕悖同姓之恩追戎啓逺人之侮觀社則國政荒刻桷則侈心騁此莊公之所以不能克已者也養慶父之禍而弗除歸季子之賢而弗任此閔公之所以不能保國者也弃夏盟而即楚則有從夷之罪先晉室而後周則無敬君之節須句之功不足掩升陘之辱取穀之辱不足洗至酅之恥此僖之所以不得為全賢也三書不雨無勤民之心四不視朔無自强之志處父厭盟則辱於晉郪丘賂盟則辱於齊此文公之所以安於媮政也賂田求㛰君大夫奔走無寧歲以為媚齊之謀不會於扈不盟於清丘而無事晉之志一逞於兵則伐莒伐邾猶未已也而伐萊伐杞一放於邾則取向取澤猶未饜也而取根牟此宣之所以無良圖也四卿得志於齊僅能報二鄙之侵而十年三朝三聘于晉不能止沙隨苕丘之辱如京師似可以求尊君之名而會盟于蜀莫能掩其背華之實此成公得不償失而不知其非也仲孫之用事者五叔孫之用事者十有四季孫之用事者十有三卿專政之形成齊人伐我者七邾人伐我者二莒人伐我者四則鄰國交爭之禍起雖享國久長倚晉為重而已階削弱之端此襄公治實生亂而不悟其變也納牟夷之叛則非所以為臣子之訓娶吳則非所以明三綱之序如晉至河而見郤則無以為託國之謀築郎囿則民力竭於公蒐紅蒐比蒲則戎政歸於下此昭公所以淹恤於乾侯也會於夾谷而歸龜陰之田行乎季孫而墮費郈之都雖僅能明禮義之治雉門兩觀之作而僭典莫之改寶玉大弓之竊而分器莫之保慆於女樂而政歸强家此定公所以有聖人而不克用也五伐邾而勞師于外四城邑而罷民於内伐齊以離中國之與事吳以結非類之好此哀公所以身適國之辱也夫魯雖秉周公伯禽之法守四代之服器其實衰微削弱不得與齊晉大國齒而僅肩隨陳鄭曹衞之閒然所以猶賢於諸侯者有二其君猶知以禮而自守也其卿大夫多識文獻典章之舊也而所以國多變故而不靖者亦有二其家法不設而無正始之道也其兵柄不収而無馭下之綱也當時齊晉圖伯常以得魯為重魯之向背乃列國之所觀瞻齊桓始合會盟魯之不肯輕從者蓋遲遲二十餘年鄄之首會姑以單伯來幽之初盟僅以微者會陽穀之合天下莫敢不至矣亦以公子友莅盟至召陵以後始堅於事齊而齊未得魯則莫能自安也宋襄以非禮召諸侯望望然去之若將凂焉及楚虔為申之會汰心虐燄震揺諸華誰能遏禦大侯小伯雖心知其不可黽勉麇至而魯獨從容退遜辭以時祭是所謂其君猶知以禮自守也臧僖伯觀魚之諫能陳軌物法度之言臧哀伯取鼎之諫能舉禮樂文物之訓曹劌觀社之諫能明聘會征伐之典展喜之退齊師能道先王盟府之命季文子之逐莒僕能識君子事君之禮大師之樂不失二南二雅之章大史氏之書能備春秋易象之文是所謂其卿大夫猶多識典章之舊也此魯之所以猶賢於諸侯者乎自桓公不能刑于文姜而詒二國之患自莊公不能防閑哀姜而遺再世之禍共仲則通哀姜而賊般弑閔襄仲則私敬嬴而殺惡及視是所謂其家法不設而無正始之道也自隱失權於翬莊失權於慶父文失權於仲遂宣失權於歸父襄失權於宿斯昭失權於意如宋樂祁曰魯君喪政四世矣政在季氏三世矣晉史墨曰季氏貳諸侯為日久矣魯君世從其失季氏世修其勤民忘君矣況定哀以後哉是所謂其兵柄不収而無馭下之綱也此魯之所以國多變故而不靖者乎吁以魯積累之徳其遺風善政所存者僅如此而末流之弊又復甚焉或曰魯之弱也尊尊而親親此後世不能與時消息而裁於中修善自反而趨於善豈造端者之過歟春秋王霸列國世紀編卷一
